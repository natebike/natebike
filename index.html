
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>natebike</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Supabase JS (UMD) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --blue:#004a95;
      --lightblue:#004a95;
      --bg:#ffffff;
      --note:#ffd84d;
      --text:#0b1a2a;
      --danger:#7a0b0b;
      --adminGrey:#c9c9c9;
      --adminGreen:#9be39b;
      --adminBorder:#7d7d7d;
      --rentRed:#d7191c;
    }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header{
      padding: 14px 16px 8px 16px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
    }
    .headerLeft{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 0;
    }
    #logo{
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: contain;
    }
    h1{
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-transform: lowercase;
      color: var(--blue);
      white-space: nowrap;
    }

    .adminBtn{
      background: var(--adminGrey);
      border: 1px solid var(--adminBorder);
      color: #1b1b1b;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .adminBtn.isAdmin{
      background: var(--adminGreen);
      border-color: #3b8f3b;
      color: #0b2a0b;
    }

    .wrap{
      padding: 8px 16px 16px 16px;
      height: calc(100% - 70px);
      box-sizing: border-box;
    }

    #mapFrame, #lockFrame{
      height: 100%;
      border: 4px solid var(--lightblue);
      border-radius: 8px;
      box-sizing: border-box;
      overflow: hidden;
      background: #fff;
      position: relative;
    }
    #map{ height: 100%; width: 100%; }

    /* Lock screen */
    #lockFrame{
      display: grid;
      place-items: center;
      background: #fff;
    }
    .lockPanel{
      width: min(520px, 92%);
      border: 3px solid var(--blue);
      border-radius: 12px;
      padding: 16px;
      box-sizing: border-box;
      background: #fff;
    }
    .lockRow{
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px;
      align-items: center;
    }
    .lockLabel{ font-size: 16px; }
    input[type="password"], input[type="text"], textarea{
      width: 100%;
      border: 1px solid #cfd7e6;
      border-radius: 8px;
      padding: 10px 10px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    textarea{
      min-height: 72px;
      resize: vertical;
      padding: 9px 10px;
    }
    .lockFooter{
      display:flex;
      justify-content: flex-end;
      margin-top: 14px;
    }
    #pwMsg{
      margin-top:10px;
      color: var(--danger);
      font-size: 13px;
      display:none;
    }

    /* Context menu */
    .ctx-menu{
      position: fixed;
      z-index: 9999;
      background: #fff;
      border: 2px solid var(--blue);
      border-radius: 8px;
      min-width: 190px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.14);
      padding: 6px;
      display: none;
      user-select: none;
    }
    .ctx-item{
      padding: 10px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .ctx-item:hover{ background: rgba(0,74,149,0.08); }
    .ctx-item.disabled{
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Modal */
    .modal-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: none;
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .modal{
      width: min(580px, 95vw);
      background: #fff;
      border: 3px solid var(--blue);
      border-radius: 10px;
      padding: 14px 14px 12px 14px;
      box-sizing: border-box;
    }
    .modal h2{
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 800;
      color: var(--blue);
      text-transform: lowercase;
    }
    .grid{
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px 12px;
      align-items: center;
    }
    .label{ font-size: 14px; }

    .photoBtn{
      width: 100px;
      height: 100px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
      padding: 8px;
      line-height: 1.15;
    }
    .photoPreview{
      width: 100px;
      height: 100px;
      border-radius: 10px;
      border: 1px solid #cfd7e6;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .modal-footer{
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
      gap: 10px;
      align-items: center;
    }
    .btn{
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-transform: lowercase;
    }
    .btn.danger{ background: var(--danger); }
    .btn.secondary{
      background: #e8f0ff;
      border: 1px solid #b9c6f2;
      color: var(--blue);
    }
    .btn.rent{ background: var(--blue); }
    .btn.rent.isRented{ background: var(--rentRed); }

    .hint{
      color: var(--danger);
      font-size: 13px;
      margin-right: auto;
      display: none;
    }

    .statusBar{
      position:absolute;
      left: 10px;
      bottom: 10px;
      z-index: 5000;
      background: rgba(255,255,255,0.92);
      border: 1px solid #cfd7e6;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: #25324a;
      display:none;
      max-width: 70%;
    }

    /* Notiz icon */
    .noteIconWrap{
      width: 34px; height: 28px;
      background: var(--note);
      border: 2px solid #b08a00;
      border-radius: 4px;
      position: relative;
      box-sizing: border-box;
    }
    .noteIconWrap:after{
      content:"";
      position:absolute;
      right:-2px; top:-2px;
      width: 12px; height: 12px;
      background: #fff3b2;
      border-left: 2px solid #b08a00;
      border-bottom: 2px solid #b08a00;
      transform: rotate(45deg) translate(4px,-4px);
      transform-origin: top right;
    }

    /* 3s toast */
    #toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: #fff;
      border: 3px solid var(--blue);
      border-radius: 12px;
      padding: 12px 14px;
      z-index: 20000;
      display: none;
      max-width: min(700px, 92vw);
      font-weight: 700;
      color: #0b1a2a;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }
  </style>
</head>

<body>
  <header>
    <div class="headerLeft">
      <img id="logo" alt="logo" src="logo.png" />
      <h1>natebike</h1>
    </div>

    <button id="adminBtn" class="adminBtn" type="button">Admin</button>
  </header>

  <div class="wrap">
    <div id="lockFrame">
      <div class="lockPanel">
        <div class="lockRow">
          <div class="lockLabel">Passwort:</div>
          <input id="pwInput" type="password" autocomplete="current-password" />
        </div>
        <div class="lockFooter">
          <button class="btn" id="pwBtn" type="button">bestätigen</button>
        </div>
        <div id="pwMsg">falsches Passwort</div>
      </div>
    </div>

    <div id="mapFrame" style="display:none;">
      <div id="map"></div>
      <div id="statusBar" class="statusBar"></div>
    </div>
  </div>

  <div id="ctxMenu" class="ctx-menu">
    <div class="ctx-item" data-action="bike" id="ctxBike">neues Rad hinzufügen</div>
    <div class="ctx-item" data-action="note">Notitz hinzufügen</div>
  </div>

  <div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modalTitle">details</h2>
      <div class="grid" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <div id="adminOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>admin</h2>
      <div class="grid">
        <div class="label">Passwort</div>
        <input id="adminPwInput" type="password" autocomplete="current-password" />
      </div>
      <div style="margin-top:10px;color:var(--danger);display:none;font-size:13px;" id="adminMsg">
        falsches Passwort
      </div>
      <div class="modal-footer">
        <button class="btn secondary" id="adminCancelBtn" type="button">schließen</button>
        <button class="btn" id="adminOkBtn" type="button">bestätigen</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <input id="fileInput" type="file" accept="image/jpeg" style="display:none" />

  <script>
    // IMPORTANT:
    // Bike marker icon is now logo.png using L.Icon.
    // Rented state is shown by adding a red circle ring around the logo.

    const SUPABASE_URL = "https://lczpdudidvzbcalzprzl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjenBkdWRpZHZ6YmNhbHpwcnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA2MDcsImV4cCI6MjA4NzU5NjYwN30.j_3fTPlwpeQNDut5iTx5b2r5sENaTlFMk-L0fBnQYL4";
    const SUPABASE_BUCKET = "marker-photos";

    const APP_PASSWORD = "drahtesel";
    const ADMIN_PASSWORD = "eseldraht";

    const KASSEL_CENTER = [51.3127, 9.4797];
    const DEFAULT_ZOOM = 13;

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }
    function randId(n=10){
      const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
      let s = "";
      for(let i=0;i<n;i++) s += chars[Math.floor(Math.random()*chars.length)];
      return s;
    }
    async function readFileAsDataURL(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function scaleToJpegBlob(dataUrl, maxSidePx, quality=0.9){
      const img = new Image();
      img.src = dataUrl;
      await img.decode();
      const w = img.naturalWidth, h = img.naturalHeight;
      const scale = Math.min(1, maxSidePx / Math.max(w, h));
      const nw = Math.max(1, Math.round(w * scale));
      const nh = Math.max(1, Math.round(h * scale));
      const canvas = document.createElement('canvas');
      canvas.width = nw; canvas.height = nh;
      canvas.getContext('2d').drawImage(img, 0, 0, nw, nh);
      return await new Promise((resolve) => canvas.toBlob(b => resolve(b), 'image/jpeg', quality));
    }

    const statusBar = document.getElementById('statusBar');
    let statusTimer = null;
    function showStatus(msg){
      statusBar.textContent = msg;
      statusBar.style.display = 'block';
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => statusBar.style.display = 'none', 2500);
    }

    const toast = document.getElementById('toast');
    let toastTimer = null;
    function showToast(msg, ms=3000){
      toast.textContent = msg;
      toast.style.display = 'block';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.style.display = 'none', ms);
    }

    // Admin state: not persisted
    let isAdmin = false;

    const adminBtn = document.getElementById('adminBtn');
    const adminOverlay = document.getElementById('adminOverlay');
    const adminPwInput = document.getElementById('adminPwInput');
    const adminMsg = document.getElementById('adminMsg');
    const adminOkBtn = document.getElementById('adminOkBtn');
    const adminCancelBtn = document.getElementById('adminCancelBtn');

    function updateAdminUI(){
      adminBtn.classList.toggle('isAdmin', isAdmin);
      const ctxBike = document.getElementById('ctxBike');
      if(ctxBike){
        if(isAdmin) ctxBike.classList.remove('disabled');
        else ctxBike.classList.add('disabled');
      }
    }
    function openAdminModal(){
      adminMsg.style.display = 'none';
      adminPwInput.value = '';
      adminOverlay.style.display = 'flex';
      adminPwInput.focus();
    }
    function closeAdminModal(){ adminOverlay.style.display = 'none'; }
    function logoutAdmin(){
      isAdmin = false;
      updateAdminUI();
      showStatus('admin abgemeldet');
    }

    adminBtn.addEventListener('click', () => {
      if(isAdmin) logoutAdmin();
      else openAdminModal();
    });
    adminCancelBtn.addEventListener('click', closeAdminModal);
    adminOverlay.addEventListener('click', (e) => { if(e.target === adminOverlay) closeAdminModal(); });

    function confirmAdmin(){
      const val = (adminPwInput.value || "").trim();
      if(val !== ADMIN_PASSWORD){
        adminMsg.textContent = "falsches Passwort";
        adminMsg.style.display = 'block';
        return;
      }
      isAdmin = true;
      updateAdminUI();
      closeAdminModal();
      showStatus('admin aktiv');
    }
    adminOkBtn.addEventListener('click', confirmAdmin);
    adminPwInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') confirmAdmin(); });

    // Gate
    const lockFrame = document.getElementById('lockFrame');
    const mapFrame = document.getElementById('mapFrame');
    const pwInput = document.getElementById('pwInput');
    const pwBtn = document.getElementById('pwBtn');
    const pwMsg = document.getElementById('pwMsg');

    // Supabase
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Map
    const map = L.map('map', { center: KASSEL_CENTER, zoom: DEFAULT_ZOOM, dragging: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);

    // Device location marker (red ring)
    let locationMarker = null;
    function setOrUpdateLocationMarker(latlng){
      if(!locationMarker){
        locationMarker = L.circleMarker(latlng, {
          radius: 10,
          color: '#ff0000',
          weight: 3,
          fillColor: 'transparent',
          fillOpacity: 0
        }).addTo(map);
      }else{
        locationMarker.setLatLng(latlng);
      }
    }

    async function getDeviceLatLng(timeoutMs=7000){
      return new Promise((resolve) => {
        let done = false;

        const ok = (e) => {
          if(done) return;
          done = true;
          resolve(e.latlng);
        };
        const fail = () => {
          if(done) return;
          done = true;
          resolve(null);
        };

        map.once('locationfound', ok);
        map.once('locationerror', fail);

        map.locate({
          setView: false,
          watch: false,
          enableHighAccuracy: true,
          maximumAge: 15000,
          timeout: timeoutMs
        });

        setTimeout(fail, timeoutMs + 800);
      });
    }

    async function centerOnDeviceOrKassel(){
      const ll = await getDeviceLatLng(7000);
      if(ll){
        map.setView(ll, 16, { animate: true });
        setOrUpdateLocationMarker(ll);
        return true;
      }else{
        map.setView(KASSEL_CENTER, DEFAULT_ZOOM, { animate: false });
        return false;
      }
    }

    // Icons:
    // Bike icon uses logo.png
    const bikeLogoIcon = L.icon({
      iconUrl: 'logo.png',
      iconSize: [40, 40],
      iconAnchor: [20, 20]
    });

    // For rented bikes: logo + red ring (divIcon)
    function makeBikeRentedIcon(){
      const size = 44;
      return L.divIcon({
        className: '',
        html: `
          <div style="width:${size}px;height:${size}px;position:relative;">
            <div style="
              position:absolute;inset:0;
              border:4px solid var(--rentRed);
              border-radius:50%;
              box-sizing:border-box;
            "></div>
            <img src="logo.png" alt="" style="
              position:absolute;
              left:50%;top:50%;
              transform:translate(-50%,-50%);
              width:40px;height:40px;
              border-radius:50%;
              object-fit:contain;
              background:transparent;
            "/>
          </div>
        `,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2]
      });
    }

    // Note icon
    const noteIcon = L.divIcon({
      className: '',
      html: `<div class="noteIconWrap"></div>`,
      iconSize: [34, 28],
      iconAnchor: [17, 14]
    });

    // App state
    // entry: { type, marker, dbId, photo_url, data, isRented:boolean }
    const markers = new Map();
    let pendingPhotoTarget = null;

    // DB helpers
    async function dbLoadAll(){
      const { data, error } = await sb
        .from('markers')
        .select('*')
        .order('created_at', { ascending: true });
      if(error) throw error;
      return data || [];
    }
    async function dbInsert(type, lat, lng){
      const payload = {
        type, lat, lng,
        name:'natebike',
        color:'undefiniert',
        remark:'keine',
        photo_url:null,
        content:' ',
        is_rented:false
      };
      const { data, error } = await sb.from('markers').insert(payload).select().single();
      if(error) throw error;
      return data;
    }
    async function dbUpdate(id, patch){
      const { error } = await sb.from('markers').update(patch).eq('id', id);
      if(error) throw error;
    }
    async function dbDelete(id){
      const { error } = await sb.from('markers').delete().eq('id', id);
      if(error) throw error;
    }

    // Storage helper
    async function uploadPhotoAndGetPublicUrl(fileBlob){
      const fileName = `bike_${Date.now()}_${randId(6)}.jpg`;
      const { error: upErr } = await sb.storage.from(SUPABASE_BUCKET).upload(
        fileName, fileBlob, { contentType: 'image/jpeg', upsert: false }
      );
      if(upErr) throw upErr;
      const { data } = sb.storage.from(SUPABASE_BUCKET).getPublicUrl(fileName);
      return { fileName, publicUrl: data.publicUrl };
    }

    function applyRentedState(entry){
      entry.marker.setIcon(entry.isRented ? makeBikeRentedIcon() : bikeLogoIcon);
      if(entry.isRented){
        entry.marker.dragging.disable();
      }else{
        entry.marker.dragging.enable();
      }
    }

    function wireMarkerEvents(entry){
      const marker = entry.marker;

      const openFn = (e) => {
        if(e) L.DomEvent.stop(e);
        if(entry.type === 'bike') openBikeWindow(entry);
        else openNoteEditor(entry);
      };
      marker.on('click', openFn);
      marker.on('contextmenu', openFn);

      marker.on('dragstart', () => map.dragging.disable());
      marker.on('dragend', async () => {
        map.dragging.enable();
        try{
          const ll = marker.getLatLng();
          await dbUpdate(entry.dbId, { lat: ll.lat, lng: ll.lng });
          showStatus('position gespeichert');
        }catch(err){
          console.error(err);
          showStatus('fehler beim speichern der position');
        }
      });
    }

    function addMarkerFromRow(row){
      if(row.type === 'bike'){
        const rented = !!row.is_rented;
        const marker = L.marker(
          { lat: row.lat, lng: row.lng },
          { icon: rented ? makeBikeRentedIcon() : bikeLogoIcon, draggable: true }
        ).addTo(map);

        const entry = {
          type: 'bike',
          marker,
          dbId: row.id,
          photo_url: row.photo_url || null,
          data: {
            Name: row.name ?? 'natebike',
            Farbe: row.color ?? 'undefiniert',
            Bemerkung: row.remark ?? 'keine',
            Foto: row.photo_url ? (row.photo_url.split('/').pop() || 'vorhanden') : 'nicht vorhanden'
          },
          isRented: rented
        };

        markers.set(marker._leaflet_id, entry);
        applyRentedState(entry);
        wireMarkerEvents(entry);
        return entry;
      } else {
        const marker = L.marker({ lat: row.lat, lng: row.lng }, { icon: noteIcon, draggable: true }).addTo(map);
        const entry = {
          type: 'note',
          marker,
          dbId: row.id,
          photo_url: null,
          data: { Inhalt: row.content ?? ' ' }
        };
        markers.set(marker._leaflet_id, entry);
        wireMarkerEvents(entry);
        return entry;
      }
    }

    async function createBikeAt(latlng){
      if(!isAdmin){
        showStatus('nur admin kann räder erstellen');
        return;
      }
      const row = await dbInsert('bike', latlng.lat, latlng.lng);
      const entry = addMarkerFromRow(row);
      openBikeWindow(entry);
      showStatus('rad erstellt');
    }

    async function createNoteAt(latlng){
      const row = await dbInsert('note', latlng.lat, latlng.lng);
      const entry = addMarkerFromRow(row);
      openNoteEditor(entry);
      showStatus('notitz erstellt');
    }

    // Context menu
    const ctxMenu = document.getElementById('ctxMenu');
    let ctxLatLng = null;

    function hideCtxMenu(){
      ctxMenu.style.display = 'none';
      ctxLatLng = null;
    }

    map.getContainer().addEventListener('contextmenu', (e) => e.preventDefault());
    map.on('contextmenu', (e) => {
      ctxLatLng = e.latlng;
      const oe = e.originalEvent;
      ctxMenu.style.left = `${oe.clientX}px`;
      ctxMenu.style.top  = `${oe.clientY}px`;
      ctxMenu.style.display = 'block';
      updateAdminUI();
    });

    map.on('click', hideCtxMenu);
    map.on('movestart', hideCtxMenu);
    document.addEventListener('click', (e) => { if (!ctxMenu.contains(e.target)) hideCtxMenu(); });

    ctxMenu.addEventListener('click', async (e) => {
      const item = e.target.closest('.ctx-item');
      if(!item || !ctxLatLng) return;

      const action = item.dataset.action;
      const ll = ctxLatLng;
      hideCtxMenu();

      try{
        if(action === 'bike'){
          if(!isAdmin) return;
          await createBikeAt(ll);
        }
        if(action === 'note'){
          await createNoteAt(ll);
        }
      }catch(err){
        console.error(err);
        showStatus('fehler beim erstellen');
      }
    });

    // Modal
    const overlay = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalFooter = document.getElementById('modalFooter');
    const modalTitle = document.getElementById('modalTitle');
    const fileInput = document.getElementById('fileInput');

    function openModal(){ overlay.style.display = 'flex'; }
    function closeModal(){
      overlay.style.display = 'none';
      modalBody.innerHTML = '';
      modalFooter.innerHTML = '';
      modalTitle.textContent = 'details';
      pendingPhotoTarget = null;
      fileInput.value = '';
    }
    overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

    // Bike window
    function openBikeWindow(entry){
      modalTitle.textContent = 'geparktes rad';

      const isRented = !!entry.isRented;

      const photoCell = entry.photo_url
        ? `<img class="photoPreview" id="photoPreview" src="${escapeHtml(entry.photo_url)}" alt="Foto" />`
        : `<button class="photoBtn" id="photoBtn" type="button">Foto hinzufügen</button>`;

      const nameField = isAdmin
        ? `<input type="text" id="bikeName" value="${escapeHtml(entry.data.Name)}" />`
        : `<input type="text" id="bikeName" value="${escapeHtml(entry.data.Name)}" readonly />`;

      const colorField = isAdmin
        ? `<input type="text" id="bikeColor" value="${escapeHtml(entry.data.Farbe)}" />`
        : `<input type="text" id="bikeColor" value="${escapeHtml(entry.data.Farbe)}" readonly />`;

      const remarkField = isAdmin
        ? `<input type="text" id="bikeRemark" value="${escapeHtml(entry.data.Bemerkung)}" />`
        : `<input type="text" id="bikeRemark" value="${escapeHtml(entry.data.Bemerkung)}" readonly />`;

      modalBody.innerHTML = `
        <div class="label">Name</div>
        ${nameField}

        <div class="label">Farbe</div>
        ${colorField}

        <div class="label">Bemerkung</div>
        ${remarkField}

        <div class="label">Foto</div>
        <div>${photoCell}</div>
      `;

      // photo upload for all; auto-save
      const photoClick = () => { pendingPhotoTarget = entry; fileInput.click(); };
      const btn = document.getElementById('photoBtn');
      const prev = document.getElementById('photoPreview');
      if(btn) btn.addEventListener('click', photoClick);
      if(prev){
        prev.style.cursor = 'pointer';
        prev.title = 'klicken zum foto ersetzen';
        prev.addEventListener('click', photoClick);
      }

      const rentLabel = isRented ? "abstellen" : "ausleihen";
      const rentClass = isRented ? "isRented" : "";

      modalFooter.innerHTML = `
        <div id="rentHint" class="hint"></div>
        <button class="btn rent ${rentClass}" id="rentBtn" type="button">${rentLabel}</button>
        ${isAdmin ? `<button class="btn" id="bikeSaveBtn" type="button">speichern</button>` : ``}
        ${isAdmin ? `<button class="btn danger" id="bikeDeleteBtn" type="button">löschen</button>` : ``}
      `;

      // Save & delete only admin
      if(isAdmin){
        document.getElementById('bikeSaveBtn').addEventListener('click', async () => {
          const nameVal = document.getElementById('bikeName').value.trim();
          const colorVal = document.getElementById('bikeColor').value.trim();
          const remarkVal = document.getElementById('bikeRemark').value.trim();

          const patch = {};
          if(nameVal !== '') patch.name = nameVal;
          if(colorVal !== '') patch.color = colorVal;
          if(remarkVal !== '') patch.remark = remarkVal;

          try{
            if(Object.keys(patch).length){
              await dbUpdate(entry.dbId, patch);
              if(patch.name) entry.data.Name = patch.name;
              if(patch.color) entry.data.Farbe = patch.color;
              if(patch.remark) entry.data.Bemerkung = patch.remark;
            }
            showStatus('gespeichert');
            closeModal();
          }catch(err){
            console.error(err);
            showStatus('fehler beim speichern');
          }
        });

        document.getElementById('bikeDeleteBtn').addEventListener('click', async () => {
          try{
            await dbDelete(entry.dbId);
            map.removeLayer(entry.marker);
            markers.delete(entry.marker._leaflet_id);
            showStatus('gelöscht');
            closeModal();
          }catch(err){
            console.error(err);
            showStatus('fehler beim löschen');
          }
        });
      }

      // Rent/return globally
      const rentBtn = document.getElementById('rentBtn');
      const rentHint = document.getElementById('rentHint');

      async function moveToDeviceLocationOrShowHint(){
        const ll = await getDeviceLatLng(7000);
        if(!ll){
          rentHint.textContent = "Standort nicht verfügbar. Bitte verschiebe das Rad manuell an den neuen Abstellort.";
          rentHint.style.display = 'block';
          return null;
        }
        rentHint.style.display = 'none';

        entry.marker.setLatLng(ll);
        await dbUpdate(entry.dbId, { lat: ll.lat, lng: ll.lng });
        setOrUpdateLocationMarker(ll);
        return ll;
      }

      rentBtn.addEventListener('click', async () => {
        try{
          if(!entry.isRented){
            const ll = await moveToDeviceLocationOrShowHint();
            if(!ll) return;

            await dbUpdate(entry.dbId, { is_rented: true });
            entry.isRented = true;
            applyRentedState(entry);

            rentBtn.textContent = "abstellen";
            rentBtn.classList.add('isRented');
          } else {
            await dbUpdate(entry.dbId, { is_rented: false });
            entry.isRented = false;
            applyRentedState(entry);

            rentBtn.textContent = "ausleihen";
            rentBtn.classList.remove('isRented');

            showToast("Rückgabe erfolgreich :) Bitte prüfe, ob der Standort des Rades stimmt und verschiebe ihn, wenn nötig manuell.", 3000);
          }
        }catch(err){
          console.error(err);
          showStatus('fehler bei ausleihen/abstellen');
        }
      });

      openModal();
    }

    // Note unchanged
    function openNoteEditor(entry){
      modalTitle.textContent = 'notitz';
      modalBody.innerHTML = `
        <div class="label">Inhalt</div>
        <textarea id="noteContent">${escapeHtml(entry.data.Inhalt)}</textarea>
      `;
      modalFooter.innerHTML = `
        <button class="btn" id="noteSaveBtn" type="button">speichern</button>
        <button class="btn danger" id="noteDeleteBtn" type="button">löschen</button>
      `;

      document.getElementById('noteSaveBtn').addEventListener('click', async () => {
        const contentVal = document.getElementById('noteContent').value.trim();
        if(contentVal === ''){ closeModal(); return; }
        try{
          await dbUpdate(entry.dbId, { content: contentVal });
          entry.data.Inhalt = contentVal;
          showStatus('gespeichert');
          closeModal();
        }catch(err){
          console.error(err);
          showStatus('fehler beim speichern');
        }
      });

      document.getElementById('noteDeleteBtn').addEventListener('click', async () => {
        try{
          await dbDelete(entry.dbId);
          map.removeLayer(entry.marker);
          markers.delete(entry.marker._leaflet_id);
          showStatus('gelöscht');
          closeModal();
        }catch(err){
          console.error(err);
          showStatus('fehler beim löschen');
        }
      });

      openModal();
    }

    // Photo upload: auto-save
    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file || !pendingPhotoTarget) return;

      if(file.type !== 'image/jpeg'){
        alert('Bitte eine JPG-Datei auswählen.');
        fileInput.value = '';
        return;
      }
      if(file.size > 5 * 1024 * 1024){
        alert('Bitte Maximalgröße von 5 MB beachten!');
        fileInput.value = '';
        return;
      }

      const entry = pendingPhotoTarget;

      try{
        showStatus('foto wird hochgeladen…');

        const dataUrl = await readFileAsDataURL(file);
        const jpgBlob = await scaleToJpegBlob(dataUrl, 100, 0.9);
        const { fileName, publicUrl } = await uploadPhotoAndGetPublicUrl(jpgBlob);

        await dbUpdate(entry.dbId, { photo_url: publicUrl });

        entry.photo_url = publicUrl;
        entry.data.Foto = fileName;

        const photoBtn = document.getElementById('photoBtn');
        const prev = document.getElementById('photoPreview');

        if(photoBtn){
          const img = document.createElement('img');
          img.className = 'photoPreview';
          img.id = 'photoPreview';
          img.src = publicUrl;
          img.alt = 'Foto';
          img.style.cursor = 'pointer';
          img.title = 'klicken zum foto ersetzen';
          img.addEventListener('click', () => { pendingPhotoTarget = entry; fileInput.click(); });
          photoBtn.replaceWith(img);
        }else if(prev){
          prev.src = publicUrl;
        }

        showStatus('foto gespeichert');
      }catch(err){
        console.error(err);
        showStatus('fehler beim foto-upload');
      }finally{
        pendingPhotoTarget = null;
        fileInput.value = '';
      }
    });

    // Password gate
    async function unlock(e){
      if(e) e.preventDefault();
      const val = (pwInput.value || "").trim();

      if(val !== APP_PASSWORD){
        pwMsg.textContent = "falsches Passwort";
        pwMsg.style.display = 'block';
        return;
      }

      pwMsg.style.display = 'none';
      lockFrame.style.display = 'none';
      lockFrame.hidden = true;

      mapFrame.style.display = 'block';
      mapFrame.hidden = false;

      setTimeout(() => map.invalidateSize(), 150);

      const ok = await centerOnDeviceOrKassel();
      if(!ok) showStatus('standort nicht verfügbar – kassel');

      try{
        updateAdminUI();
        showStatus('lade marker…');
        const rows = await dbLoadAll();
        for(const row of rows) addMarkerFromRow(row);
        showStatus('fertig');
      }catch(err){
        console.error(err);
        showStatus('fehler beim laden');
      }
    }

    pwBtn.addEventListener('click', unlock);
    pwInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') unlock(e); });

    updateAdminUI();
  </script>
</body>
</html>
