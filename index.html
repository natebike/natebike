<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>natebike</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --blue:#004a95;
      --lightblue:#004a95;
      --bg:#ffffff;
      --text:#0b1a2a;
      --danger:#7a0b0b;
      --adminGrey:#c9c9c9;
      --adminGreen:#9be39b;
      --adminBorder:#7d7d7d;
      --rentRed:#d7191c;
      --blinkRed:#ff0000;
    }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header{
      padding: 14px 16px 8px 16px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
    }
    .headerLeft{ display:flex; align-items:center; gap: 12px; min-width: 0; }
    #logo{ width: 40px; height: 40px; border-radius: 8px; object-fit: contain; }
    h1{
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-transform: lowercase;
      color: var(--blue);
      white-space: nowrap;
      font-family: "Century Gothic", "URW Gothic L", "Futura", Arial, sans-serif;
    }

    .adminBtn{
      background: var(--adminGrey);
      border: 1px solid var(--adminBorder);
      color: #1b1b1b;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .adminBtn.isAdmin{
      background: var(--adminGreen);
      border-color: #3b8f3b;
      color: #0b2a0b;
    }

    .wrap{
      padding: 8px 16px 16px 16px;
      height: calc(100% - 70px);
      box-sizing: border-box;
    }

    #mapFrame, #lockFrame{
      height: 100%;
      border: 4px solid var(--lightblue);
      border-radius: 8px;
      box-sizing: border-box;
      overflow: hidden;
      background: #fff;
      position: relative;
    }
    #map{ height: 100%; width: 100%; }

    /* Lock screen */
    #lockFrame{
      display: grid;
      place-items: center;
      background: #fff;
    }
    .lockPanel{
      width: min(520px, 92%);
      border: 3px solid var(--blue);
      border-radius: 12px;
      padding: 16px;
      box-sizing: border-box;
      background: #fff;
    }
    .lockRow{
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px;
      align-items: center;
    }
    .lockLabel{ font-size: 16px; }
    input[type="password"], input[type="text"], textarea{
      width: 100%;
      border: 1px solid #cfd7e6;
      border-radius: 8px;
      padding: 10px 10px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    textarea{ min-height: 72px; resize: vertical; padding: 9px 10px; }
    .lockFooter{ display:flex; justify-content: flex-end; margin-top: 14px; }
    #pwMsg{ margin-top:10px; color: var(--danger); font-size: 13px; display:none; }

    /* Context menus */
    .ctx-menu{
      position: fixed;
      z-index: 9999;
      background: #fff;
      border: 2px solid var(--blue);
      border-radius: 8px;
      min-width: 210px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.14);
      padding: 6px;
      display: none;
      user-select: none;
    }
    .ctx-item{
      padding: 10px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .ctx-item:hover{ background: rgba(0,74,149,0.08); }
    .ctx-item.disabled{ opacity: 0.45; cursor: not-allowed; }

    /* Modal */
    .modal-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: none;
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .modal{
      width: min(620px, 95vw);
      background: #fff;
      border: 3px solid var(--blue);
      border-radius: 10px;
      padding: 14px 14px 12px 14px;
      box-sizing: border-box;
    }
    .modal h2{
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 800;
      color: var(--blue);
      text-transform: lowercase;
    }
    .grid{
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px 12px;
      align-items: center;
    }
    .label{ font-size: 14px; }

    .photoBtn{
      width: 100px; height: 100px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
      padding: 8px;
      line-height: 1.15;
    }
    .photoPreview{
      width: 100px; height: 100px;
      border-radius: 10px;
      border: 1px solid #cfd7e6;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .modal-footer{
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
      gap: 10px;
      align-items: center;
    }
    .btn{
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-transform: lowercase;
    }
    .btn.danger{ background: var(--danger); }

    .statusBar{
      position:absolute;
      left: 10px; bottom: 10px;
      z-index: 5000;
      background: rgba(255,255,255,0.92);
      border: 1px solid #cfd7e6;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: #25324a;
      display:none;
      max-width: 70%;
    }

    @keyframes blinkRing {
      0%, 100% { opacity: 0.15; transform: translate(-50%,-50%) scale(0.98); }
      50%      { opacity: 1.00; transform: translate(-50%,-50%) scale(1.08); }
    }

    /* Bike: small position symbol */
    .posPin{
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--blue);
      border: 2px solid #ffffff;
      box-sizing: border-box;
      box-shadow: 0 0 0 2px rgba(0,74,149,0.35);
    }
    .posPin.rented{
      background: var(--rentRed);
      box-shadow: 0 0 0 2px rgba(215,25,28,0.35);
    }
    .posPin.move{
      animation: blinkRing 0.9s infinite ease-in-out;
      border-color: var(--blinkRed);
      box-shadow: 0 0 0 2px rgba(255,0,0,0.25);
    }

    /* Locate button */
    .locateBtn{
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--blue);
      background: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }
    .locateBtn:hover{ background: rgba(0,74,149,0.06); }
    .crosshair{
      width: 18px;
      height: 18px;
      border: 2px solid var(--blue);
      border-radius: 50%;
      position: relative;
      box-sizing: border-box;
    }
    .crosshair:before, .crosshair:after{ content:""; position:absolute; background: var(--blue); }
    .crosshair:before{ width: 2px; height: 22px; left: 50%; top: 50%; transform: translate(-50%,-50%); }
    .crosshair:after{ height: 2px; width: 22px; left: 50%; top: 50%; transform: translate(-50%,-50%); }
  </style>
</head>

<body>
  <header>
    <div class="headerLeft">
      <img id="logo" alt="logo" src="logo.png" />
      <h1>natebike</h1>
    </div>
    <button id="adminBtn" class="adminBtn" type="button">Admin</button>
  </header>

  <div class="wrap">
    <div id="lockFrame">
      <div class="lockPanel">
        <div class="lockRow">
          <div class="lockLabel">Passwort:</div>
          <input id="pwInput" type="password" autocomplete="current-password" />
        </div>
        <div class="lockFooter">
          <button class="btn" id="pwBtn" type="button">bestätigen</button>
        </div>
        <div id="pwMsg">falsches Passwort</div>
      </div>
    </div>

    <div id="mapFrame" style="display:none;">
      <div id="map"></div>
      <div id="statusBar" class="statusBar"></div>
    </div>
  </div>

  <div id="ctxMenuMap" class="ctx-menu">
    <div class="ctx-item" data-action="bike" id="ctxBike">neues Rad hinzufügen</div>
    <div class="ctx-item" data-action="note">Notitz hinzufügen</div>
  </div>

  <div id="ctxMenuMarker" class="ctx-menu">
    <div class="ctx-item" data-action="open">öffnen</div>
    <div class="ctx-item" data-action="move">verschieben</div>
  </div>

  <div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modalTitle">details</h2>
      <div class="grid" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <div id="adminOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>admin</h2>
      <div class="grid">
        <div class="label">Passwort</div>
        <input id="adminPwInput" type="password" autocomplete="current-password" />
      </div>
      <div style="margin-top:10px;color:var(--danger);display:none;font-size:13px;" id="adminMsg">
        falsches Passwort
      </div>
      <div class="modal-footer">
        <button class="btn secondary" id="adminCancelBtn" type="button">schließen</button>
        <button class="btn" id="adminOkBtn" type="button">bestätigen</button>
      </div>
    </div>
  </div>

  <input id="fileInput" type="file" accept="image/jpeg" style="display:none" />

  <script>
    // status
    const statusBar = document.getElementById('statusBar');
    let statusTimer = null;
    function showStatus(msg){
      statusBar.textContent = msg;
      statusBar.style.display = 'block';
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => statusBar.style.display = 'none', 2500);
    }

    // lock
    const lockFrame = document.getElementById('lockFrame');
    const mapFrame = document.getElementById('mapFrame');
    const pwInput = document.getElementById('pwInput');
    const pwBtn = document.getElementById('pwBtn');
    const pwMsg = document.getElementById('pwMsg');

    // admin
    let isAdmin = false;
    const adminBtn = document.getElementById('adminBtn');
    const adminOverlay = document.getElementById('adminOverlay');
    const adminPwInput = document.getElementById('adminPwInput');
    const adminMsg = document.getElementById('adminMsg');
    const adminOkBtn = document.getElementById('adminOkBtn');
    const adminCancelBtn = document.getElementById('adminCancelBtn');

    function updateAdminUI(){
      adminBtn.classList.toggle('isAdmin', isAdmin);
      const ctxBike = document.getElementById('ctxBike');
      if(ctxBike){
        if(isAdmin) ctxBike.classList.remove('disabled');
        else ctxBike.classList.add('disabled');
      }
    }
    function openAdminModal(){
      adminMsg.style.display = 'none';
      adminPwInput.value = '';
      adminOverlay.style.display = 'flex';
      adminPwInput.focus();
    }
    function closeAdminModal(){ adminOverlay.style.display = 'none'; }
    function logoutAdmin(){
      isAdmin = false;
      updateAdminUI();
      showStatus('admin abgemeldet');
    }
    adminBtn.addEventListener('click', () => {
      if(isAdmin) logoutAdmin();
      else openAdminModal();
    });
    adminCancelBtn.addEventListener('click', closeAdminModal);
    adminOverlay.addEventListener('click', (e) => { if(e.target === adminOverlay) closeAdminModal(); });
    function confirmAdmin(){
      const val = (adminPwInput.value || "").trim();
      if(val !== "eseldraht"){
        adminMsg.textContent = "falsches Passwort";
        adminMsg.style.display = 'block';
        return;
      }
      isAdmin = true;
      updateAdminUI();
      closeAdminModal();
      showStatus('admin aktiv');
    }
    adminOkBtn.addEventListener('click', confirmAdmin);
    adminPwInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') confirmAdmin(); });

    // supabase
    const sb = supabase.createClient("https://lczpdudidvzbcalzprzl.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjenBkdWRpZHZ6YmNhbHpwcnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA2MDcsImV4cCI6MjA4NzU5NjYwN30.j_3fTPlwpeQNDut5iTx5b2r5sENaTlFMk-L0fBnQYL4"
    );
    const SUPABASE_BUCKET = "marker-photos";

    // map
    const map = L.map('map', { center: [51.3127, 9.4797], zoom: 13, dragging: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);

    // locate control
    const LocateControl = L.Control.extend({
      options: { position: 'bottomright' },
      onAdd: function() {
        const btn = L.DomUtil.create('div', 'locateBtn');
        btn.title = 'Standort zentrieren';
        btn.innerHTML = '<div class="crosshair"></div>';
        L.DomEvent.disableClickPropagation(btn);
        L.DomEvent.on(btn, 'click', async () => {
          const ok = await centerOnDeviceOrKassel(true);
          if(!ok) showStatus('standort nicht verfügbar');
        });
        return btn;
      }
    });
    map.addControl(new LocateControl());

    // location marker
    let locationMarker = null;
    function setOrUpdateLocationMarker(latlng){
      if(!locationMarker){
        locationMarker = L.circleMarker(latlng, { radius: 10, color:'#ff0000', weight:3, fillOpacity:0 }).addTo(map);
      }else{
        locationMarker.setLatLng(latlng);
      }
    }

    let lastDeviceLatLng = null;
    let locationTimer = null;

    async function getDeviceLatLng(timeoutMs=4000){
      return new Promise((resolve) => {
        let done=false;
        const ok = (e)=>{ if(done) return; done=true; resolve(e.latlng); };
        const fail = ()=>{ if(done) return; done=true; resolve(null); };
        map.once('locationfound', ok);
        map.once('locationerror', fail);
        map.locate({ setView:false, watch:false, enableHighAccuracy:true, maximumAge:15000, timeout: timeoutMs });
        setTimeout(fail, timeoutMs+800);
      });
    }

    async function refreshDeviceLocationOnce(){
      const ll = await getDeviceLatLng(4000);
      if(ll){
        lastDeviceLatLng = ll;
        setOrUpdateLocationMarker(ll);
        return true;
      }
      return false;
    }

    function startLocationUpdates(){
      if(locationTimer) clearInterval(locationTimer);
      refreshDeviceLocationOnce();
      locationTimer = setInterval(refreshDeviceLocationOnce, 5000);
    }

    async function centerOnDeviceOrKassel(forceCenter=false){
      const ok = await refreshDeviceLocationOnce();
      if(ok && forceCenter){
        map.setView(lastDeviceLatLng, 16);
        return true;
      }
      if(ok) return true;
      if(forceCenter) map.setView([51.3127, 9.4797], 13);
      return false;
    }

    // icons
    const logoIcon = L.icon({ iconUrl:'logo.png', iconSize:[40,40], iconAnchor:[20,20] });

    function makePosIcon(rented=false, moving=false){
      const cls = `posPin ${rented ? 'rented' : ''} ${moving ? 'move' : ''}`;
      return L.divIcon({ className:'', html:`<div class="${cls}"></div>`, iconSize:[14,14], iconAnchor:[7,7] });
    }

    // state
    const markers = new Map();
    let moveModeEntry = null;
    let pendingPhotoTarget = null;

    function findEntryByDbId(dbId){
      for (const entry of markers.values()){
        if(entry.dbId === dbId) return entry;
      }
      return null;
    }

    function iconForEntry(entry){
      const moving = (moveModeEntry && moveModeEntry === entry);
      if(entry.type === 'bike') return makePosIcon(entry.isRented, moving);
      // notes use logo
      return logoIcon;
    }

    function applyRowToEntry(entry, row){
      if (!(moveModeEntry && moveModeEntry === entry) && typeof row.lat === 'number' && typeof row.lng === 'number'){
        entry.marker.setLatLng([row.lat, row.lng]);
      }
      entry.isRented = !!row.is_rented;

      if(entry.type === 'bike'){
        entry.data.Name = row.name ?? entry.data.Name;
        entry.data.Farbe = row.color ?? entry.data.Farbe;
        entry.data.Bemerkung = row.remark ?? entry.data.Bemerkung;
        entry.data.Nummer = row.bike_number ?? entry.data.Nummer;
        entry.data.Schlosscode = row.code ?? entry.data.Schlosscode;
        entry.photo_url = row.photo_url ?? entry.photo_url ?? null;
      } else {
        entry.data.Inhalt = row.content ?? entry.data.Inhalt;
      }

      entry.marker.setIcon(iconForEntry(entry));
    }

    async function dbLoadAll(){
      const { data, error } = await sb.from('markers').select('*').order('created_at', { ascending:true });
      if(error) throw error;
      return data || [];
    }
    async function dbInsert(type, lat, lng){
      const payload = { type, lat, lng, name:'natebike', color:'undefiniert', remark:'keine', photo_url:null, content:' ', is_rented:false, bike_number:'', code:'' };
      const { data, error } = await sb.from('markers').insert(payload).select().single();
      if(error) throw error;
      return data;
    }
    async function dbUpdate(id, patch){
      const { error } = await sb.from('markers').update(patch).eq('id', id);
      if(error) throw error;
    }
    async function dbDelete(id){
      const { error } = await sb.from('markers').delete().eq('id', id);
      if(error) throw error;
    }

    async function uploadPhotoAndGetPublicUrl(fileBlob){
      const fileName = `bike_${Date.now()}_${Math.random().toString(36).slice(2,8)}.jpg`;
      const { error: upErr } = await sb.storage.from(SUPABASE_BUCKET).upload(fileName, fileBlob, { contentType:'image/jpeg', upsert:false });
      if(upErr) throw upErr;
      const { data } = sb.storage.from(SUPABASE_BUCKET).getPublicUrl(fileName);
      return { fileName, publicUrl: data.publicUrl };
    }

    async function finalizeMarkerMove(entry){
      try{
        const ll = entry.marker.getLatLng();
        await dbUpdate(entry.dbId, { lat: ll.lat, lng: ll.lng });
        showStatus('position gespeichert');
      }catch(err){
        console.error(err);
        showStatus('fehler beim speichern der position');
      }finally{
        if(entry.marker.dragging) entry.marker.dragging.disable();
        entry.marker.options.draggable = false;
        entry.marker.setIcon(iconForEntry(entry));
        moveModeEntry = null;
      }
    }

    function setMarkerDraggableOnce(entry){
      if(entry.isRented){
        showStatus('marker ist nicht verschiebbar (ausgeliehen)');
        return;
      }
      entry.marker.setIcon(iconForEntry(entry));
      if(entry.marker.dragging) entry.marker.dragging.enable();
      entry.marker.options.draggable = true;
      moveModeEntry = entry;
      showStatus('marker verschieben: ziehen und loslassen');
    }

    function wireMarker(entry){
      const m = entry.marker;
      m.options.draggable = false;
      if(m.dragging) m.dragging.disable();

      m.on('dragstart', () => map.dragging.disable());
      m.on('dragend', async () => {
        map.dragging.enable();
        if(moveModeEntry === entry) await finalizeMarkerMove(entry);
      });

      m.on('contextmenu', (e) => {
        L.DomEvent.stop(e);
        openMarkerMenu(e.originalEvent, entry);
      });

      m.on('click', (e) => {
        L.DomEvent.stop(e);
        if(entry.type === 'bike') openBikeWindow(entry);
        else openNoteEditor(entry);
      });
    }

    function addMarkerFromRow(row){
      const entry = {
        type: row.type,
        marker: L.marker({lat:row.lat, lng:row.lng}, { icon: null, draggable:false }).addTo(map),
        dbId: row.id,
        photo_url: row.photo_url || null,
        isRented: !!row.is_rented,
        data: row.type === 'bike'
          ? {
              Nummer: row.bike_number ?? '',
              Name: row.name ?? 'natebike',
              Farbe: row.color ?? 'undefiniert',
              Bemerkung: row.remark ?? 'keine',
              Schlosscode: row.code ?? ''
            }
          : { Inhalt: row.content ?? ' ' }
      };

      entry.marker.setIcon(iconForEntry(entry));
      markers.set(entry.marker._leaflet_id, entry);
      wireMarker(entry);
      return entry;
    }

    async function createBikeAt(latlng){
      if(!isAdmin){ showStatus('nur admin kann räder erstellen'); return; }
      const row = await dbInsert('bike', latlng.lat, latlng.lng);
      const entry = addMarkerFromRow(row);
      openBikeWindow(entry);
      showStatus('rad erstellt');
    }

    async function createNoteAt(latlng){
      const row = await dbInsert('note', latlng.lat, latlng.lng);
      const entry = addMarkerFromRow(row);
      openNoteEditor(entry);
      showStatus('notitz erstellt');
    }

    // realtime
    const realtimeChannel = sb
      .channel('markers-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, (payload) => {
        if(payload.eventType === 'INSERT'){
          const row = payload.new;
          if(findEntryByDbId(row.id)) return;
          addMarkerFromRow(row);
          return;
        }
        if(payload.eventType === 'UPDATE'){
          const row = payload.new;
          const entry = findEntryByDbId(row.id);
          if(!entry){ addMarkerFromRow(row); return; }
          applyRowToEntry(entry, row);
          return;
        }
        if(payload.eventType === 'DELETE'){
          const row = payload.old;
          const entry = findEntryByDbId(row.id);
          if(!entry) return;
          map.removeLayer(entry.marker);
          markers.delete(entry.marker._leaflet_id);
        }
      })
      .subscribe();

    // menus
    const ctxMenuMap = document.getElementById('ctxMenuMap');
    const ctxMenuMarker = document.getElementById('ctxMenuMarker');
    let ctxMapLatLng = null;
    let ctxMarkerEntry = null;

    function hideMenusOnly(){
      ctxMenuMap.style.display = 'none';
      ctxMenuMarker.style.display = 'none';
      ctxMarkerEntry = null;
    }

    map.getContainer().addEventListener('contextmenu', (e)=>e.preventDefault());

    map.on('contextmenu', (e) => {
      ctxMapLatLng = e.latlng;
      const oe = e.originalEvent;
      hideMenusOnly();
      ctxMenuMap.style.left = `${oe.clientX}px`;
      ctxMenuMap.style.top  = `${oe.clientY}px`;
      ctxMenuMap.style.display = 'block';
      updateAdminUI();
    });

    ctxMenuMap.addEventListener('pointerdown', (e)=>e.stopPropagation());
    ctxMenuMarker.addEventListener('pointerdown', (e)=>e.stopPropagation());

    map.on('click', hideMenusOnly);
    map.on('movestart', hideMenusOnly);
    document.addEventListener('pointerdown', (e) => {
      if (!ctxMenuMap.contains(e.target) && !ctxMenuMarker.contains(e.target)) hideMenusOnly();
    });

    ctxMenuMap.addEventListener('pointerdown', async (e) => {
      const item = e.target.closest('.ctx-item');
      if(!item || !ctxMapLatLng) return;
      const action = item.dataset.action;
      hideMenusOnly();
      if(action === 'bike') await createBikeAt(ctxMapLatLng);
      if(action === 'note') await createNoteAt(ctxMapLatLng);
    });

    function openMarkerMenu(mouseEvent, entry){
      hideMenusOnly();
      ctxMarkerEntry = entry;
      ctxMenuMarker.style.left = `${mouseEvent.clientX}px`;
      ctxMenuMarker.style.top  = `${mouseEvent.clientY}px`;
      ctxMenuMarker.style.display = 'block';
    }

    ctxMenuMarker.addEventListener('pointerdown', (e) => {
      const item = e.target.closest('.ctx-item');
      if(!item || !ctxMarkerEntry) return;
      const action = item.dataset.action;
      const entry = ctxMarkerEntry;
      hideMenusOnly();
      if(action === 'open'){
        if(entry.type === 'bike') openBikeWindow(entry);
        else openNoteEditor(entry);
      }
      if(action === 'move') setMarkerDraggableOnce(entry);
    });

    // modal
    const overlay = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalFooter = document.getElementById('modalFooter');
    const modalTitle = document.getElementById('modalTitle');
    const fileInput = document.getElementById('fileInput');

    function openModal(){ overlay.style.display = 'flex'; }
    function closeModal(){
      overlay.style.display = 'none';
      modalBody.innerHTML = '';
      modalFooter.innerHTML = '';
      modalTitle.textContent = 'details';
      pendingPhotoTarget = null;
      fileInput.value = '';
    }
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

    function openBikeWindow(entry){
      modalTitle.textContent = 'geparktes rad';

      const photoCell = entry.photo_url
        ? `<img class="photoPreview" id="photoPreview" src="${escapeHtml(entry.photo_url)}" alt="Foto" />`
        : `<button class="photoBtn" id="photoBtn" type="button">Foto hinzufügen</button>`;

      // required order: Nummer; Name; Farbe; Bemerkung; Schlosscode
      const ro = isAdmin ? '' : 'readonly';

      modalBody.innerHTML = `
        <div class="label">Nummer</div>
        <input type="text" value="${escapeHtml(entry.data.Nummer)}" ${ro} id="bikeNumber"/>

        <div class="label">Name</div>
        <input type="text" value="${escapeHtml(entry.data.Name)}" ${ro} id="bikeName"/>

        <div class="label">Farbe</div>
        <input type="text" value="${escapeHtml(entry.data.Farbe)}" ${ro} id="bikeColor"/>

        <div class="label">Bemerkung</div>
        <input type="text" value="${escapeHtml(entry.data.Bemerkung)}" ${ro} id="bikeRemark"/>

        <div class="label">Schlosscode</div>
        <input type="text" value="${escapeHtml(entry.data.Schlosscode)}" ${ro} id="bikeCode"/>

        <div class="label">Foto</div>
        <div>${photoCell}</div>
      `;

      const photoClick = () => { pendingPhotoTarget = entry; fileInput.click(); };
      const btn = document.getElementById('photoBtn');
      const prev = document.getElementById('photoPreview');
      if(btn) btn.addEventListener('click', photoClick);
      if(prev) prev.addEventListener('click', photoClick);

      modalFooter.innerHTML = `
        ${isAdmin ? `<button class="btn" id="bikeSaveBtn" type="button">speichern</button>` : ``}
        ${isAdmin ? `<button class="btn danger" id="bikeDeleteBtn" type="button">löschen</button>` : ``}
      `;

      // BUGFIX: once:true + type="button" + await + show error
      if(isAdmin){
        const saveBtn = document.getElementById('bikeSaveBtn');
        if(saveBtn){
          saveBtn.addEventListener('click', async () => {
            try{
              saveBtn.disabled = true;

              const numberVal = document.getElementById('bikeNumber').value.trim();
              const nameVal = document.getElementById('bikeName').value.trim();
              const colorVal = document.getElementById('bikeColor').value.trim();
              const remarkVal = document.getElementById('bikeRemark').value.trim();
              const codeVal = document.getElementById('bikeCode').value.trim();

              const out = {};
              // overwrite even if empty? your old logic was "don't overwrite if empty".
              // Keep that behavior:
              if(numberVal !== '') out.bike_number = numberVal;
              if(nameVal !== '') out.name = nameVal;
              if(colorVal !== '') out.color = colorVal;
              if(remarkVal !== '') out.remark = remarkVal;
              if(codeVal !== '') out.code = codeVal;

              if(Object.keys(out).length){
                await dbUpdate(entry.dbId, out);
                showStatus('gespeichert');
              }
              closeModal();
            }catch(err){
              console.error(err);
              showStatus('fehler beim speichern');
              saveBtn.disabled = false;
            }
          }, { once: true });
        }

        const delBtn = document.getElementById('bikeDeleteBtn');
        if(delBtn){
          delBtn.addEventListener('click', async () => {
            try{
              delBtn.disabled = true;
              await dbDelete(entry.dbId);
              map.removeLayer(entry.marker);
              markers.delete(entry.marker._leaflet_id);
              closeModal();
            }catch(err){
              console.error(err);
              showStatus('fehler beim löschen');
              delBtn.disabled = false;
            }
          }, { once: true });
        }
      }

      openModal();
    }

    function openNoteEditor(entry){
      modalTitle.textContent = 'notitz';
      modalBody.innerHTML = `
        <div class="label">Inhalt</div>
        <textarea id="noteContent">${escapeHtml(entry.data.Inhalt)}</textarea>
      `;
      modalFooter.innerHTML = `
        <button class="btn" id="noteSaveBtn" type="button">speichern</button>
        <button class="btn danger" id="noteDeleteBtn" type="button">löschen</button>
      `;

      document.getElementById('noteSaveBtn').addEventListener('click', async () => {
        const v = document.getElementById('noteContent').value.trim();
        if(!v){ closeModal(); return; }
        await dbUpdate(entry.dbId, { content: v });
        closeModal();
      }, { once:true });

      document.getElementById('noteDeleteBtn').addEventListener('click', async () => {
        await dbDelete(entry.dbId);
        map.removeLayer(entry.marker);
        markers.delete(entry.marker._leaflet_id);
        closeModal();
      }, { once:true });

      openModal();
    }

    // photo upload auto-save
    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file || !pendingPhotoTarget) return;

      if(file.type !== 'image/jpeg'){
        alert('Bitte eine JPG-Datei auswählen.');
        fileInput.value = '';
        return;
      }
      if(file.size > 5*1024*1024){
        alert('Bitte Maximalgröße von 5 MB beachten!');
        fileInput.value = '';
        return;
      }

      const entry = pendingPhotoTarget;
      try{
        showStatus('foto wird hochgeladen…');
        const dataUrl = await readFileAsDataURL(file);
        const jpgBlob = await scaleToJpegBlob(dataUrl, 100, 0.9);
        const fileName = `bike_${Date.now()}_${randId(6)}.jpg`;
        const { error: upErr } = await sb.storage.from(SUPABASE_BUCKET).upload(
          fileName, jpgBlob, { contentType:'image/jpeg', upsert:false }
        );
        if(upErr) throw upErr;
        const { data } = sb.storage.from(SUPABASE_BUCKET).getPublicUrl(fileName);
        await dbUpdate(entry.dbId, { photo_url: data.publicUrl });
        entry.photo_url = data.publicUrl;

        const photoBtn = document.getElementById('photoBtn');
        const prev = document.getElementById('photoPreview');
        if(photoBtn){
          const img = document.createElement('img');
          img.className='photoPreview';
          img.id='photoPreview';
          img.src = data.publicUrl;
          img.alt='Foto';
          img.addEventListener('click', ()=>{ pendingPhotoTarget = entry; fileInput.click(); });
          photoBtn.replaceWith(img);
        } else if(prev){
          prev.src = data.publicUrl;
        }
        showStatus('foto gespeichert');
      }catch(err){
        console.error(err);
        showStatus('fehler beim foto-upload');
      }finally{
        pendingPhotoTarget = null;
        fileInput.value = '';
      }
    });

    // unlock
    async function unlock(){
      const val = (pwInput.value || "").trim();
      if(val !== "drahtesel"){
        pwMsg.textContent = "falsches Passwort";
        pwMsg.style.display = 'block';
        return;
      }
      pwMsg.style.display = 'none';
      lockFrame.style.display = 'none';
      mapFrame.style.display = 'block';
      setTimeout(()=>map.invalidateSize(), 100);

      const ok = await centerOnDeviceOrKassel(true);
      if(!ok) showStatus('standort nicht verfügbar – kassel');

      startLocationUpdates();
      updateAdminUI();

      const rows = await dbLoadAll();
      rows.forEach((row) => { if(!findEntryByDbId(row.id)) addMarkerFromRow(row); });
    }

    pwBtn.addEventListener('click', unlock);
    pwInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') unlock(); });

    updateAdminUI();
  </script>
</body>
</html>
