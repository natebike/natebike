<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>natebike</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --blue:#004a95;
      --lightblue:#004a95;
      --bg:#ffffff;
      --text:#0b1a2a;
      --danger:#7a0b0b;

      --adminGrey:#c9c9c9;
      --adminGreen:#9be39b;
      --adminBorder:#7d7d7d;
      --noteDefault:#ffd84d;
    }

    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header{
      padding: 14px 16px 8px 16px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
    }
    .headerLeft{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 0;
    }
    #logo{
      width: 40px; height: 40px;
      border-radius: 8px;
      object-fit: contain;
    }
    h1{
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      text-transform: lowercase;
      color: var(--blue);
      white-space: nowrap;
    }

    .headerRight{
      display:flex;
      align-items:center;
      gap: 10px;
    }

    .adminBtn, .userManageBtn{
      background: var(--adminGrey);
      border: 1px solid var(--adminBorder);
      color: #1b1b1b;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }
    .adminBtn.isAdmin{
      background: var(--adminGreen);
      border-color: #3b8f3b;
      color: #0b2a0b;
    }

    .wrap{
      padding: 8px 16px 16px 16px;
      height: calc(100% - 70px);
      box-sizing: border-box;
    }

    #mapFrame, #loginFrame{
      height: 100%;
      border: 4px solid var(--lightblue);
      border-radius: 8px;
      box-sizing: border-box;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    #map{ height: 100%; width: 100%; }

    /* Login screen */
    #loginFrame{
      display: grid;
      place-items: center;
      background: #fff;
    }
    .panel{
      width: min(560px, 92%);
      border: 3px solid var(--blue);
      border-radius: 12px;
      padding: 16px;
      box-sizing: border-box;
      background: #fff;
    }
    .grid2{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap: 10px 12px;
      align-items:center;
    }
    .label{ font-size: 14px; }
    input[type="text"], input[type="password"], textarea{
      width: 100%;
      border: 1px solid #cfd7e6;
      border-radius: 8px;
      padding: 10px 10px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    textarea{
      min-height: 72px;
      resize: vertical;
      padding: 9px 10px;
    }
    .panelFooter{
      display:flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    /* Context menu */
    .ctx-menu{
      position: fixed;
      z-index: 9999;
      background: #fff;
      border: 2px solid var(--blue);
      border-radius: 8px;
      min-width: 210px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.14);
      padding: 6px;
      display: none;
      user-select: none;
    }
    .ctx-item{
      padding: 10px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .ctx-item:hover{ background: rgba(0,74,149,0.08); }
    .ctx-item.disabled{ opacity:0.45; cursor:not-allowed; }

    /* Modal */
    .modal-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: none;
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .modal{
      width: min(620px, 95vw);
      background: #fff;
      border: 3px solid var(--blue);
      border-radius: 10px;
      padding: 14px 14px 12px 14px;
      box-sizing: border-box;
    }
    .modal h2{
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 800;
      color: var(--blue);
      text-transform: lowercase;
    }
    .grid{
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px 12px;
      align-items: center;
    }

    .btn{
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-transform: lowercase;
    }
    .btn.secondary{
      background: #e8f0ff;
      border: 1px solid #b9c6f2;
      color: var(--blue);
    }
    .btn.danger{ background: var(--danger); }

    .photoBtn{
      width: 100px;
      height: 100px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
      padding: 8px;
      line-height: 1.15;
    }
    .photoPreview{
      width: 100px;
      height: 100px;
      border-radius: 10px;
      border: 1px solid #cfd7e6;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .statusBar{
      position:absolute;
      left: 10px;
      bottom: 10px;
      z-index: 5000;
      background: rgba(255,255,255,0.92);
      border: 1px solid #cfd7e6;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: #25324a;
      display:none;
      max-width: 75%;
    }

    /* Marker icons */
    .bikeIconWrap{
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--blue);
      display: grid; place-items: center;
      border: 2px solid var(--blue);
      box-sizing: border-box;
    }
    .noteIconWrap{
      width: 34px; height: 28px;
      background: var(--noteDefault);
      border: 2px solid #b08a00;
      border-radius: 4px;
      position: relative;
      box-sizing: border-box;
    }
    .noteIconWrap:after{
      content:"";
      position:absolute;
      right:-2px; top:-2px;
      width: 12px; height: 12px;
      background: #fff3b2;
      border-left: 2px solid #b08a00;
      border-bottom: 2px solid #b08a00;
      transform: rotate(45deg) translate(4px,-4px);
      transform-origin: top right;
    }
  </style>
</head>

<body>
  <header>
    <div class="headerLeft">
      <img id="logo" alt="logo" src="logo.png" />
      <h1>natebike</h1>
    </div>

    <div class="headerRight">
      <button id="adminBtn" class="adminBtn" type="button">Admin</button>
      <button id="userManageBtn" class="userManageBtn" type="button" style="display:none;">Nutzer bearbeiten</button>
    </div>
  </header>

  <div class="wrap">
    <!-- Login (Nickname + Farbe) -->
    <div id="loginFrame">
      <div class="panel">
        <h2 style="margin:0 0 12px 0;color:var(--blue);text-transform:lowercase;">anmeldung</h2>
        <div class="grid2">
          <div class="label">Nutzername</div>
          <input id="loginUsername" type="text" placeholder="z.B. max" />

          <div class="label">Farbe</div>
          <input id="loginColor" type="text" value="#ffd84d" placeholder="#ffd84d" />
        </div>

        <div id="loginMsg" style="margin-top:10px;color:var(--danger);display:none;font-size:13px;">
          bitte nutzernamen eingeben
        </div>

        <div class="panelFooter">
          <button class="btn" id="loginBtn" type="button">bestätigen</button>
        </div>
      </div>
    </div>

    <div id="mapFrame" style="display:none;">
      <div id="map"></div>
      <div id="statusBar" class="statusBar"></div>
    </div>
  </div>

  <!-- Map context menu -->
  <div id="ctxMenu" class="ctx-menu">
    <div class="ctx-item" data-action="bike" id="ctxBike">neues Rad hinzufügen</div>
    <div class="ctx-item" data-action="note">Notitz hinzufügen</div>
  </div>

  <!-- User manage menu (admin) -->
  <div id="userMenu" class="ctx-menu">
    <div class="ctx-item" data-action="user_add">Nutzer hinzufügen</div>
    <div class="ctx-item" data-action="user_list">Nutzerliste</div>
  </div>

  <!-- Generic modal -->
  <div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modalTitle">details</h2>
      <div class="grid" id="modalBody"></div>
      <div class="panelFooter" id="modalFooter" style="margin-top:14px;"></div>
    </div>
  </div>

  <!-- Admin modal -->
  <div id="adminOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>admin</h2>
      <div class="grid">
        <div class="label">Passwort</div>
        <input id="adminPwInput" type="password" />
      </div>
      <div style="margin-top:10px;color:var(--danger);display:none;font-size:13px;" id="adminMsg">
        falsches Passwort
      </div>
      <div class="panelFooter">
        <button class="btn secondary" id="adminCancelBtn" type="button">schließen</button>
        <button class="btn" id="adminOkBtn" type="button">bestätigen</button>
      </div>
    </div>
  </div>

  <input id="fileInput" type="file" accept="image/jpeg" style="display:none" />

  <script>
    // =======================
    // Supabase (public)
    // =======================
    const SUPABASE_URL = "https://lczpdudidvzbcalzprzl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjenBkdWRpZHZ6YmNhbHpwcnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA2MDcsImV4cCI6MjA4NzU5NjYwN30.j_3fTPlwpeQNDut5iTx5b2r5sENaTlFMk-L0fBnQYL4";
    const SUPABASE_BUCKET = "marker-photos";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =======================
    // Admin (UI-only)
    // =======================
    const ADMIN_PASSWORD = "eseldraht";
    let isAdmin = false;

    // =======================
    // Current user (nickname)
    // =======================
    let currentUser = null; // { username, color }

    // =======================
    // Helpers
    // =======================
    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'","&#039;");
    }
    function randId(n=10){
      const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
      let s = "";
      for(let i=0;i<n;i++) s += chars[Math.floor(Math.random()*chars.length)];
      return s;
    }
    function validHexColor(s){
      return /^#[0-9A-Fa-f]{6}$/.test(String(s||"").trim());
    }

    const statusBar = document.getElementById('statusBar');
    let statusTimer = null;
    function showStatus(msg){
      statusBar.textContent = msg;
      statusBar.style.display = 'block';
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => statusBar.style.display = 'none', 2500);
    }

    async function readFileAsDataURL(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function scaleToJpegBlob(dataUrl, maxSidePx, quality=0.9){
      const img = new Image();
      img.src = dataUrl;
      await img.decode();

      const w = img.naturalWidth, h = img.naturalHeight;
      const scale = Math.min(1, maxSidePx / Math.max(w, h));
      const nw = Math.max(1, Math.round(w * scale));
      const nh = Math.max(1, Math.round(h * scale));

      const canvas = document.createElement('canvas');
      canvas.width = nw; canvas.height = nh;
      canvas.getContext('2d').drawImage(img, 0, 0, nw, nh);

      return await new Promise((resolve) => canvas.toBlob(b => resolve(b), 'image/jpeg', quality));
    }

    // =======================
    // UI: Login
    // =======================
    const loginFrame = document.getElementById('loginFrame');
    const mapFrame = document.getElementById('mapFrame');
    const loginUsername = document.getElementById('loginUsername');
    const loginColor = document.getElementById('loginColor');
    const loginBtn = document.getElementById('loginBtn');
    const loginMsg = document.getElementById('loginMsg');

    async function ensureUserInDb(username, color){
      // Upsert into users_public (no password)
      const { error } = await sb.from('users_public').upsert({ username, color }, { onConflict: 'username' });
      if(error) throw error;
    }

    async function doLogin(){
      const username = (loginUsername.value || "").trim();
      const color = (loginColor.value || "").trim();

      if(username === ""){
        loginMsg.textContent = "bitte nutzernamen eingeben";
        loginMsg.style.display = "block";
        return;
      }
      if(!validHexColor(color)){
        loginMsg.textContent = "bitte farbe als hex eingeben (z.B. #ffd84d)";
        loginMsg.style.display = "block";
        return;
      }

      try{
        await ensureUserInDb(username, color);
      }catch(err){
        console.error(err);
        loginMsg.textContent = "fehler beim anmelden (supabase?)";
        loginMsg.style.display = "block";
        return;
      }

      loginMsg.style.display = "none";
      currentUser = { username, color };

      // show map
      loginFrame.style.display = "none";
      mapFrame.style.display = "block";
      setTimeout(() => map.invalidateSize(), 120);

      // load markers
      await loadMarkers();
      updateAdminUI();
      showStatus(`angemeldet als ${username}`);
    }

    loginBtn.addEventListener('click', doLogin);
    loginUsername.addEventListener('keydown', (e) => { if(e.key === 'Enter') doLogin(); });
    loginColor.addEventListener('keydown', (e) => { if(e.key === 'Enter') doLogin(); });

    // =======================
    // UI: Admin + User manage
    // =======================
    const adminBtn = document.getElementById('adminBtn');
    const userManageBtn = document.getElementById('userManageBtn');

    const adminOverlay = document.getElementById('adminOverlay');
    const adminPwInput = document.getElementById('adminPwInput');
    const adminMsg = document.getElementById('adminMsg');
    const adminOkBtn = document.getElementById('adminOkBtn');
    const adminCancelBtn = document.getElementById('adminCancelBtn');

    function updateAdminUI(){
      adminBtn.classList.toggle('isAdmin', isAdmin);
      userManageBtn.style.display = isAdmin ? "inline-block" : "none";

      // context menu bike create disabled if not admin
      const ctxBike = document.getElementById('ctxBike');
      if(ctxBike){
        if(isAdmin) ctxBike.classList.remove('disabled');
        else ctxBike.classList.add('disabled');
      }
    }

    function openAdminModal(){
      adminMsg.style.display = "none";
      adminPwInput.value = "";
      adminOverlay.style.display = "flex";
      adminPwInput.focus();
    }
    function closeAdminModal(){ adminOverlay.style.display = "none"; }
    function logoutAdmin(){
      isAdmin = false;
      updateAdminUI();
      showStatus("admin abgemeldet");
    }
    function confirmAdmin(){
      if((adminPwInput.value || "").trim() !== ADMIN_PASSWORD){
        adminMsg.textContent = "falsches Passwort";
        adminMsg.style.display = "block";
        return;
      }
      isAdmin = true;
      updateAdminUI();
      closeAdminModal();
      showStatus("admin aktiv");
    }

    adminBtn.addEventListener('click', () => {
      if(isAdmin) logoutAdmin();
      else openAdminModal();
    });
    adminOkBtn.addEventListener('click', confirmAdmin);
    adminCancelBtn.addEventListener('click', closeAdminModal);
    adminPwInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') confirmAdmin(); });
    adminOverlay.addEventListener('click', (e) => { if(e.target === adminOverlay) closeAdminModal(); });

    // user manage menu (simple context menu near button)
    const userMenu = document.getElementById('userMenu');

    function hideUserMenu(){ userMenu.style.display = 'none'; }
    userManageBtn.addEventListener('click', (e) => {
      if(!isAdmin) return;
      const r = userManageBtn.getBoundingClientRect();
      userMenu.style.left = `${r.left}px`;
      userMenu.style.top = `${r.bottom + 6}px`;
      userMenu.style.display = 'block';
      e.stopPropagation();
    });
    document.addEventListener('click', (e) => {
      if(!userMenu.contains(e.target) && e.target !== userManageBtn) hideUserMenu();
    });

    // =======================
    // Leaflet init (Kassel)
    // =======================
    const map = L.map('map', { center: [51.3127, 9.4797], zoom: 13, dragging: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);

    const bikeSvg = `
      <svg width="22" height="22" viewBox="0 0 64 64" aria-hidden="true">
        <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="44" r="12"></circle>
          <circle cx="46" cy="44" r="12"></circle>
          <path d="M18 44 L28 26 L36 26"></path>
          <path d="M28 26 L40 44"></path>
          <path d="M40 44 L46 44"></path>
          <path d="M30 20 L38 20"></path>
          <path d="M28 26 L22 26"></path>
          <path d="M36 26 L42 16"></path>
        </g>
      </svg>
    `;
    const bikeIcon = L.divIcon({
      className: '',
      html: `<div class="bikeIconWrap">${bikeSvg}</div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 18]
    });

    function makeNoteIcon(color){
      const c = color && validHexColor(color) ? color : getComputedStyle(document.documentElement).getPropertyValue('--noteDefault').trim();
      return L.divIcon({
        className: '',
        html: `<div class="noteIconWrap" style="background:${c};"></div>`,
        iconSize: [34, 28],
        iconAnchor: [17, 14]
      });
    }

    // =======================
    // App state
    // =======================
    // entry: { type, marker, dbId, data, photo_url, creator, note_color }
    const markers = new Map();
    let pendingPhotoTarget = null;

    // =======================
    // DB functions (markers)
    // =======================
    async function dbLoadAllMarkers(){
      const { data, error } = await sb.from('markers').select('*').order('created_at', { ascending: true });
      if(error) throw error;
      return data || [];
    }

    async function dbInsertMarker(payload){
      const { data, error } = await sb.from('markers').insert(payload).select().single();
      if(error) throw error;
      return data;
    }

    async function dbUpdateMarker(id, patch){
      const { error } = await sb.from('markers').update(patch).eq('id', id);
      if(error) throw error;
    }

    async function dbDeleteMarker(id){
      const { error } = await sb.from('markers').delete().eq('id', id);
      if(error) throw error;
    }

    // users_public (admin UI only)
    async function dbUpsertUser(username, color){
      const { error } = await sb.from('users_public').upsert({ username, color }, { onConflict: 'username' });
      if(error) throw error;
    }
    async function dbListUsers(){
      const { data, error } = await sb.from('users_public').select('*').order('created_at', { ascending: true });
      if(error) throw error;
      return data || [];
    }
    async function dbDeleteUser(username){
      const { error } = await sb.from('users_public').delete().eq('username', username);
      if(error) throw error;
    }

    // =======================
    // Storage (photos)
    // =======================
    async function uploadPhotoAndGetPublicUrl(fileBlob){
      const fileName = `bike_${Date.now()}_${randId(6)}.jpg`;
      const { error: upErr } = await sb.storage.from(SUPABASE_BUCKET).upload(
        fileName, fileBlob, { contentType: 'image/jpeg', upsert: false }
      );
      if(upErr) throw upErr;
      const { data } = sb.storage.from(SUPABASE_BUCKET).getPublicUrl(fileName);
      return { fileName, publicUrl: data.publicUrl };
    }

    // =======================
    // Marker rights
    // =======================
    function canEditNote(entry){
      if(isAdmin) return true;
      return currentUser && entry.creator === currentUser.username;
    }
    function canMoveNote(entry){
      if(isAdmin) return true;
      return currentUser && entry.creator === currentUser.username;
    }
    function canCreateBike(){
      return isAdmin;
    }
    function canDeleteBike(){
      return isAdmin;
    }
    function canEditBikeNameColor(){
      return isAdmin;
    }
    function canEditBikeRemarkPhoto(){
      return true; // all logged-in users
    }

    // =======================
    // Marker creation / wiring
    // =======================
    function wireMarkerEvents(entry){
      const m = entry.marker;

      const openFn = (e) => {
        if(e) L.DomEvent.stop(e);
        if(entry.type === 'bike') openBikeEditor(entry);
        else openNoteEditor(entry);
      };
      m.on('click', openFn);
      m.on('contextmenu', openFn);

      m.on('dragstart', () => {
        // block moving notes if not allowed
        if(entry.type === 'note' && !canMoveNote(entry)){
          m.dragging.disable();
          showStatus('keine berechtigung (notitz)');
        }
      });

      m.on('dragend', async () => {
        // re-enable in case it was disabled
        if(!m.dragging.enabled()) m.dragging.enable();

        // enforce: non-owner cannot move note
        if(entry.type === 'note' && !canMoveNote(entry)){
          // snap back by reloading from DB (simple)
          try{
            const rows = await dbLoadAllMarkers();
            const row = rows.find(r => r.id === entry.dbId);
            if(row) m.setLatLng([row.lat, row.lng]);
          }catch {}
          return;
        }

        try{
          const ll = m.getLatLng();
          await dbUpdateMarker(entry.dbId, { lat: ll.lat, lng: ll.lng });
          showStatus('position gespeichert');
        }catch(err){
          console.error(err);
          showStatus('fehler beim speichern der position');
        }
      });
    }

    function addMarkerFromRow(row){
      const type = row.type;
      const icon = (type === 'bike')
        ? bikeIcon
        : makeNoteIcon(row.note_color || row.noteColor || row.note_colour || row.noteColorHex || row.note_color);

      const marker = L.marker([row.lat, row.lng], { icon, draggable: true }).addTo(map);

      const entry = {
        type,
        marker,
        dbId: row.id,
        photo_url: row.photo_url || null,
        creator: row.creator || "",
        note_color: row.note_color || null,
        data: {
          Name: row.name ?? 'natebike',
          Farbe: row.color ?? 'undefiniert',
          Bemerkung: row.remark ?? 'keine',
          Foto: row.photo_url ? (row.photo_url.split('/').pop() || 'vorhanden') : 'nicht vorhanden',
          Inhalt: row.content ?? ' ',
          Ersteller: row.creator || ""
        }
      };

      markers.set(marker._leaflet_id, entry);
      wireMarkerEvents(entry);
      return entry;
    }

    async function loadMarkers(){
      // clear existing
      for(const e of markers.values()){
        map.removeLayer(e.marker);
      }
      markers.clear();

      const rows = await dbLoadAllMarkers();
      rows.forEach(addMarkerFromRow);
    }

    async function createBikeAt(latlng){
      if(!canCreateBike()){
        showStatus('nur admin kann neue räder hinzufügen');
        return;
      }
      const payload = {
        type: 'bike',
        lat: latlng.lat,
        lng: latlng.lng,
        name: 'natebike',
        color: 'undefiniert',
        remark: 'keine',
        photo_url: null,
        content: ' ',
        creator: currentUser.username
      };
      const row = await dbInsertMarker(payload);
      const entry = addMarkerFromRow(row);
      openBikeEditor(entry);
      showStatus('rad erstellt');
    }

    async function createNoteAt(latlng){
      const payload = {
        type: 'note',
        lat: latlng.lat,
        lng: latlng.lng,
        name: 'natebike',
        color: 'undefiniert',
        remark: 'keine',
        photo_url: null,
        content: ' ',
        creator: currentUser.username,
        note_color: currentUser.color
      };
      const row = await dbInsertMarker(payload);
      const entry = addMarkerFromRow(row);
      openNoteEditor(entry);
      showStatus('notitz erstellt');
    }

    // =======================
    // Context menu (map)
    // =======================
    const ctxMenu = document.getElementById('ctxMenu');
    let ctxLatLng = null;

    function hideCtxMenu(){
      ctxMenu.style.display = 'none';
      ctxLatLng = null;
    }
    map.getContainer().addEventListener('contextmenu', (e) => e.preventDefault());
    map.on('contextmenu', (e) => {
      ctxLatLng = e.latlng;
      const oe = e.originalEvent;
      ctxMenu.style.left = `${oe.clientX}px`;
      ctxMenu.style.top  = `${oe.clientY}px`;
      ctxMenu.style.display = 'block';

      // disable bike create if not admin
      const ctxBike = document.getElementById('ctxBike');
      if(!canCreateBike()) ctxBike.classList.add('disabled');
      else ctxBike.classList.remove('disabled');
    });
    map.on('click', hideCtxMenu);
    map.on('movestart', hideCtxMenu);
    document.addEventListener('click', (e) => { if (!ctxMenu.contains(e.target)) hideCtxMenu(); });

    ctxMenu.addEventListener('click', async (e) => {
      const item = e.target.closest('.ctx-item');
      if(!item || !ctxLatLng) return;
      const action = item.dataset.action;
      const ll = ctxLatLng;
      hideCtxMenu();

      try{
        if(action === 'bike') await createBikeAt(ll);
        if(action === 'note') await createNoteAt(ll);
      }catch(err){
        console.error(err);
        showStatus('fehler beim erstellen');
      }
    });

    // =======================
    // Modal helpers
    // =======================
    const overlay = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalFooter = document.getElementById('modalFooter');
    const modalTitle = document.getElementById('modalTitle');
    const fileInput = document.getElementById('fileInput');

    function openModal(){ overlay.style.display = 'flex'; }
    function closeModal(){
      overlay.style.display = 'none';
      modalBody.innerHTML = '';
      modalFooter.innerHTML = '';
      modalTitle.textContent = 'details';
      pendingPhotoTarget = null;
      fileInput.value = '';
    }
    overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

    // =======================
    // Bike editor (same as before for logged-in users/admin)
    // =======================
    function openBikeEditor(entry){
      modalTitle.textContent = 'geparktes rad';

      const canNameColor = canEditBikeNameColor();
      const canRemarkPhoto = canEditBikeRemarkPhoto();

      const photoCell = entry.photo_url
        ? `<img class="photoPreview" id="photoPreview" src="${escapeHtml(entry.photo_url)}" alt="Foto" />`
        : `<button class="photoBtn" id="photoBtn" type="button">Foto hinzufügen</button>`;

      modalBody.innerHTML = `
        <div class="label">Ersteller</div>
        <input type="text" value="${escapeHtml(entry.creator)}" readonly />

        <div class="label">Name</div>
        <input type="text" id="bikeName" value="${escapeHtml(entry.data.Name)}" ${canNameColor ? "" : "readonly"} />

        <div class="label">Farbe</div>
        <input type="text" id="bikeColor" value="${escapeHtml(entry.data.Farbe)}" ${canNameColor ? "" : "readonly"} />

        <div class="label">Bemerkung</div>
        <input type="text" id="bikeRemark" value="${escapeHtml(entry.data.Bemerkung)}" ${canRemarkPhoto ? "" : "readonly"} />

        <div class="label">Foto</div>
        <div>${photoCell}</div>
      `;

      // photo upload allowed for all logged-in users
      const photoClick = () => { pendingPhotoTarget = entry; fileInput.click(); };
      const btn = document.getElementById('photoBtn');
      const prev = document.getElementById('photoPreview');
      if(btn) btn.addEventListener('click', photoClick);
      if(prev){
        prev.style.cursor = 'pointer';
        prev.title = 'klicken zum foto ersetzen';
        prev.addEventListener('click', photoClick);
      }

      const showDelete = canDeleteBike();
      modalFooter.innerHTML = showDelete
        ? `<button class="btn" id="bikeSaveBtn" type="button">speichern</button>
           <button class="btn danger" id="bikeDeleteBtn" type="button">löschen</button>`
        : `<button class="btn" id="bikeSaveBtn" type="button">speichern</button>`;

      document.getElementById('bikeSaveBtn').addEventListener('click', async () => {
        const nameVal = document.getElementById('bikeName').value.trim();
        const colorVal = document.getElementById('bikeColor').value.trim();
        const remarkVal = document.getElementById('bikeRemark').value.trim();

        const patch = {};
        if(canNameColor){
          if(nameVal !== '') patch.name = nameVal;
          if(colorVal !== '') patch.color = colorVal;
        }
        if(canRemarkPhoto){
          if(remarkVal !== '') patch.remark = remarkVal;
        }

        try{
          if(Object.keys(patch).length){
            await dbUpdateMarker(entry.dbId, patch);
            if(patch.name) entry.data.Name = patch.name;
            if(patch.color) entry.data.Farbe = patch.color;
            if(patch.remark) entry.data.Bemerkung = patch.remark;
          }
          showStatus('gespeichert');
          closeModal();
        }catch(err){
          console.error(err);
          showStatus('fehler beim speichern');
        }
      });

      if(showDelete){
        document.getElementById('bikeDeleteBtn').addEventListener('click', async () => {
          try{
            await dbDeleteMarker(entry.dbId);
            map.removeLayer(entry.marker);
            markers.delete(entry.marker._leaflet_id);
            showStatus('gelöscht');
            closeModal();
          }catch(err){
            console.error(err);
            showStatus('fehler beim löschen');
          }
        });
      }

      openModal();
    }

    // =======================
    // Note editor (owner/admin can edit; others read-only)
    // =======================
    function openNoteEditor(entry){
      modalTitle.textContent = 'notitz';

      const editable = canEditNote(entry);

      modalBody.innerHTML = `
        <div class="label">Ersteller</div>
        <input type="text" value="${escapeHtml(entry.creator)}" readonly />

        <div class="label">Inhalt</div>
        ${editable
          ? `<textarea id="noteContent">${escapeHtml(entry.data.Inhalt)}</textarea>`
          : `<textarea readonly>${escapeHtml(entry.data.Inhalt)}</textarea>`
        }
      `;

      const footerBtns = [];
      if(editable){
        footerBtns.push(`<button class="btn" id="noteSaveBtn" type="button">speichern</button>`);
      } else {
        footerBtns.push(`<button class="btn secondary" id="noteCloseBtn" type="button">schließen</button>`);
      }

      if(editable){
        footerBtns.push(`<button class="btn danger" id="noteDeleteBtn" type="button">löschen</button>`);
      }

      modalFooter.innerHTML = footerBtns.join('');

      if(!editable){
        document.getElementById('noteCloseBtn').addEventListener('click', closeModal);
        openModal();
        return;
      }

      document.getElementById('noteSaveBtn').addEventListener('click', async () => {
        const contentVal = document.getElementById('noteContent').value.trim();
        if(contentVal === ''){ closeModal(); return; }
        try{
          await dbUpdateMarker(entry.dbId, { content: contentVal });
          entry.data.Inhalt = contentVal;
          showStatus('gespeichert');
          closeModal();
        }catch(err){
          console.error(err);
          showStatus('fehler beim speichern');
        }
      });

      document.getElementById('noteDeleteBtn').addEventListener('click', async () => {
        try{
          await dbDeleteMarker(entry.dbId);
          map.removeLayer(entry.marker);
          markers.delete(entry.marker._leaflet_id);
          showStatus('gelöscht');
          closeModal();
        }catch(err){
          console.error(err);
          showStatus('fehler beim löschen');
        }
      });

      openModal();
    }

    // =======================
    // Photo upload (bike)
    // =======================
    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file || !pendingPhotoTarget) return;

      if(file.type !== 'image/jpeg'){
        alert('Bitte eine JPG-Datei auswählen.');
        fileInput.value = '';
        return;
      }
      if(file.size > 5 * 1024 * 1024){
        alert('Bitte Maximalgröße von 5 MB beachten!');
        fileInput.value = '';
        return;
      }

      const entry = pendingPhotoTarget;

      try{
        showStatus('foto wird hochgeladen…');

        const dataUrl = await readFileAsDataURL(file);
        const jpgBlob = await scaleToJpegBlob(dataUrl, 100, 0.9);
        const { fileName, publicUrl } = await uploadPhotoAndGetPublicUrl(jpgBlob);

        await dbUpdateMarker(entry.dbId, { photo_url: publicUrl });
        entry.photo_url = publicUrl;
        entry.data.Foto = fileName;

        const photoBtn = document.getElementById('photoBtn');
        const prev = document.getElementById('photoPreview');

        if(photoBtn){
          const img = document.createElement('img');
          img.className = 'photoPreview';
          img.id = 'photoPreview';
          img.src = publicUrl;
          img.alt = 'Foto';
          img.style.cursor = 'pointer';
          img.title = 'klicken zum foto ersetzen';
          img.addEventListener('click', () => { pendingPhotoTarget = entry; fileInput.click(); });
          photoBtn.replaceWith(img);
        }else if(prev){
          prev.src = publicUrl;
        }

        showStatus('foto gespeichert');
      }catch(err){
        console.error(err);
        showStatus('fehler beim foto-upload');
      }finally{
        pendingPhotoTarget = null;
        fileInput.value = '';
      }
    });

    // =======================
    // Admin: users menu actions
    // =======================
    userMenu.addEventListener('click', async (e) => {
      const item = e.target.closest('.ctx-item');
      if(!item) return;
      const action = item.dataset.action;
      hideUserMenu();

      if(!isAdmin) return;

      if(action === 'user_add'){
        openUserAddModal();
      } else if(action === 'user_list'){
        await openUserListModal();
      }
    });

    function openUserAddModal(){
      modalTitle.textContent = 'nutzer hinzufügen';
      modalBody.innerHTML = `
        <div class="label">Nutzername</div>
        <input type="text" id="newUName" />

        <div class="label">Farbe</div>
        <input type="text" id="newUColor" value="#ffd84d" placeholder="#ffd84d" />
      `;
      modalFooter.innerHTML = `
        <button class="btn secondary" id="uCancel" type="button">schließen</button>
        <button class="btn" id="uSave" type="button">speichern</button>
      `;
      document.getElementById('uCancel').addEventListener('click', closeModal);
      document.getElementById('uSave').addEventListener('click', async () => {
        const u = (document.getElementById('newUName').value || "").trim();
        const c = (document.getElementById('newUColor').value || "").trim();
        if(u === ''){ showStatus('nutzername fehlt'); return; }
        if(!validHexColor(c)){ showStatus('farbe ungültig'); return; }
        try{
          await dbUpsertUser(u, c);
          showStatus('nutzer gespeichert');
          closeModal();
        }catch(err){
          console.error(err);
          showStatus('fehler beim speichern');
        }
      });
      openModal();
    }

    async function openUserListModal(){
      modalTitle.textContent = 'nutzerliste';
      modalBody.innerHTML = `<div class="label">Lade…</div><div></div>`;
      modalFooter.innerHTML = `<button class="btn" id="closeList" type="button">schließen</button>`;
      document.getElementById('closeList').addEventListener('click', closeModal);
      openModal();

      try{
        const users = await dbListUsers();
        const html = users.map(u => {
          const uname = escapeHtml(u.username);
          const col = escapeHtml(u.color || '#ffd84d');
          return `
            <div class="label">${uname}</div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:22px;height:22px;border-radius:6px;border:1px solid #ccc;background:${col};"></div>
              <div style="font-family:ui-monospace, SFMono-Regular, Menlo, monospace;">${col}</div>
              <div style="flex:1;"></div>
              <button class="btn danger" data-del-user="${uname}" type="button">löschen</button>
            </div>
          `;
        }).join('');
        modalBody.innerHTML = html || `<div class="label">(leer)</div><div></div>`;

        // wire delete buttons
        modalBody.querySelectorAll('button[data-del-user]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const uname = btn.getAttribute('data-del-user');
            try{
              await dbDeleteUser(uname);
              showStatus('nutzer gelöscht');
              closeModal();
            }catch(err){
              console.error(err);
              showStatus('fehler beim löschen');
            }
          });
        });
      }catch(err){
        console.error(err);
        showStatus('fehler beim laden');
      }
    }

    // =======================
    // Admin: users menu positioning helpers
    // =======================
    function hideUserMenu(){ userMenu.style.display = 'none'; }

    // =======================
    // Photo upload uses modal state
    // =======================
    // pendingPhotoTarget set by bike editor
    fileInput.addEventListener('click', () => { /* keep */ });

    // =======================
    // Admin UI initialization
    // =======================
    updateAdminUI();
  </script>
</body>
</html>
