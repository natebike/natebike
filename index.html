<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>natebike</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRRr9BMY="
    crossorigin=""
  />

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --blue:#004a95;
      --bikePurple:#6a00ff;
      --rentRed:#d7191c;
      --danger:#7a0b0b;
      --adminGrey:#c9c9c9;
      --adminGreen:#9be39b;
      --text:#0b1a2a;
      --bg:#ffffff;
    }

    html, body{
      height:100%;
      margin:0;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      padding:14px 16px 8px 16px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .headerLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    #logo{
      width:40px;
      height:40px;
      border-radius:8px;
      object-fit:contain;
    }

    h1{
      margin:0;
      font-size:30px;
      font-weight:800;
      color:var(--blue);
      text-transform:lowercase;
      white-space:nowrap;
      font-family:"Century Gothic", "URW Gothic L", "Futura", Arial, sans-serif;
    }

    /* Rechte Header-Seite: Menü links, Admin rechts */
    .headerActions{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:8px;
    }

    /* Menübutton: transparent, keine Umrandung, blaue größere Striche */
    .menu-container{
      position:relative;
      display:inline-block;
    }

    .menu-btn{
      width:44px;
      height:44px;
      border:none;
      background:transparent;
      cursor:pointer;
      display:grid;
      place-items:center;
      padding:0;
    }

    .menu-lines{
      width:28px;
      height:20px;
      position:relative;
    }

    .menu-lines::before,
    .menu-lines::after,
    .menu-lines span{
      content:"";
      position:absolute;
      left:0;
      width:28px;
      height:3px;
      background:var(--blue);
      border-radius:4px;
    }

    .menu-lines::before{ top:0; }
    .menu-lines span{ top:8px; }
    .menu-lines::after{ top:16px; }

    .dropdown-menu{
      position:absolute;
      top:100%;
      right:0;
      display:none;
      background:#fff;
      border:2px solid var(--blue);
      border-radius:8px;
      min-width:220px;
      padding:6px;
      box-shadow:0 8px 22px rgba(0,0,0,0.14);
      z-index:20000;
      margin-top:5px;
    }

    .dropdown-item{
      padding:10px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    .dropdown-item:hover{
      background:rgba(0,74,149,0.08);
    }

    /* Adminbutton ohne Rahmen */
    .adminBtn{
      background:var(--adminGrey);
      border:none;
      color:#1b1b1b;
      border-radius:10px;
      padding:9px 13px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
    }

    .adminBtn.isAdmin{
      background:var(--adminGreen);
      color:#0b2a0b;
    }

    .wrap{
      padding:8px 16px 16px 16px;
      height:calc(100% - 70px);
      box-sizing:border-box;
    }

    #mapFrame,
    #lockFrame{
      height:100%;
      border:4px solid var(--blue);
      border-radius:8px;
      box-sizing:border-box;
      overflow:hidden;
      background:#fff;
      position:relative;
    }

    #map{
      height:100%;
      width:100%;
    }

    /* Passwort-Sperre */
    #lockFrame{
      display:grid;
      place-items:center;
    }

    .lockPanel{
      width:min(520px, 92%);
      border:3px solid var(--blue);
      border-radius:12px;
      padding:16px;
      box-sizing:border-box;
      background:#fff;
    }

    .lockRow{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:12px;
      align-items:center;
    }

    input[type="password"],
    input[type="text"],
    textarea{
      width:100%;
      border:1px solid #cfd7e6;
      border-radius:8px;
      padding:10px;
      font-size:14px;
      box-sizing:border-box;
      outline:none;
    }

    textarea{
      min-height:72px;
      resize:vertical;
    }

    .lockFooter{
      display:flex;
      justify-content:flex-end;
      margin-top:14px;
    }

    #pwMsg,
    #adminMsg{
      margin-top:10px;
      color:var(--danger);
      font-size:13px;
      display:none;
    }

    .btn{
      background:var(--blue);
      color:#fff;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      text-transform:lowercase;
    }

    .btn.secondary{
      background:#e8f0ff;
      border:1px solid #b9c6f2;
      color:var(--blue);
    }

    .btn.danger{
      background:var(--danger);
    }

    /* Statusanzeige */
    .statusBar{
      position:absolute;
      left:10px;
      bottom:10px;
      z-index:5000;
      background:rgba(255,255,255,0.94);
      border:1px solid #cfd7e6;
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      color:#25324a;
      display:none;
      max-width:70%;
    }

    /* Kontextmenüs */
    .ctx-menu{
      position:fixed;
      z-index:9999;
      background:#fff;
      border:2px solid var(--blue);
      border-radius:8px;
      min-width:240px;
      box-shadow:0 8px 22px rgba(0,0,0,0.14);
      padding:6px;
      display:none;
      user-select:none;
    }

    .ctx-item{
      padding:10px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    .ctx-item:hover{
      background:rgba(0,74,149,0.08);
    }

    /* Modal */
    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.25);
      display:none;
      z-index:10000;
      align-items:center;
      justify-content:center;
      padding:16px;
      box-sizing:border-box;
    }

    .modal{
      width:min(640px, 95vw);
      background:#fff;
      border:3px solid var(--blue);
      border-radius:10px;
      padding:14px;
      box-sizing:border-box;
    }

    .modal h2{
      margin:0 0 12px 0;
      font-size:16px;
      font-weight:800;
      color:var(--blue);
      text-transform:lowercase;
    }

    .grid{
      display:grid;
      grid-template-columns:140px 1fr;
      gap:10px 12px;
      align-items:center;
    }

    .label{
      font-size:14px;
    }

    .modal-footer{
      display:flex;
      justify-content:flex-end;
      margin-top:14px;
      gap:10px;
      align-items:center;
    }

    /* Listen-Overlay */
    .list-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      display:none;
      z-index:30000;
      align-items:center;
      justify-content:center;
      padding:16px;
      box-sizing:border-box;
    }

    .list-container{
      width:min(620px, 95vw);
      background:#fff;
      border:3px solid var(--blue);
      border-radius:10px;
      padding:14px;
      box-sizing:border-box;
      max-height:80vh;
      overflow-y:auto;
    }

    .list-header{
      margin:0 0 12px 0;
      font-size:16px;
      font-weight:800;
      color:var(--blue);
      text-transform:lowercase;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .close-btn{
      background:none;
      border:none;
      font-size:26px;
      cursor:pointer;
      color:var(--text);
    }

    .list-items{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .list-item{
      padding:10px;
      border:1px solid #cfd7e6;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
      line-height:1.35;
    }

    .list-item:hover{
      background:rgba(0,74,149,0.06);
      border-color:var(--blue);
    }

    .empty-list{
      padding:16px;
      color:#666;
      font-style:italic;
    }

    /* Fahrradmarker */
    .bikeWrap{
      position:relative;
      width:24px;
      height:24px;
      pointer-events:none;
    }

    .bikeDot{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:var(--bikePurple);
      box-shadow:0 2px 7px rgba(0,0,0,0.22);
      display:grid;
      place-items:center;
    }

    .bikeDot.rented{
      background:var(--rentRed);
    }

    .bikeNum{
      font-size:12px;
      font-weight:900;
      color:#fff;
      line-height:1;
      text-shadow:0 1px 2px rgba(0,0,0,0.35);
      user-select:none;
      white-space:nowrap;
      max-width:22px;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Stationsmarker */
    .stationIconWrap{
      position:relative;
      width:33px;
      height:33px;
      pointer-events:none;
    }

    .stationIconImg{
      position:absolute;
      inset:0;
      width:33px;
      height:33px;
      object-fit:contain;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,0.22));
    }

    /* Pulsieren beim Auswählen aus der Liste */
    .selectedPulse{
      animation:selectedPulse 0.45s ease-in-out 3;
      transform-origin:center center;
    }

    @keyframes selectedPulse{
      0%, 100%{ transform:scale(1); }
      50%{ transform:scale(1.5); }
    }

    /* Verschiebemodus */
    .moving{
      outline:2px solid red;
      outline-offset:2px;
    }

    /* Standortbutton */
    .locateBtn{
      width:44px;
      height:44px;
      border-radius:50%;
      border:2px solid var(--blue);
      background:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,0.18);
    }

    .crosshair{
      width:18px;
      height:18px;
      border:2px solid var(--blue);
      border-radius:50%;
      position:relative;
      box-sizing:border-box;
    }

    .crosshair::before,
    .crosshair::after{
      content:"";
      position:absolute;
      background:var(--blue);
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
    }

    .crosshair::before{
      width:2px;
      height:22px;
    }

    .crosshair::after{
      width:22px;
      height:2px;
    }
  </style>
</head>

<body>
  <header>
    <div class="headerLeft">
      <img id="logo" alt="logo" src="logo.png" />
      <h1>natebike</h1>
    </div>

    <div class="headerActions">
      <div class="menu-container">
        <button id="menuBtn" class="menu-btn" type="button" title="Menü">
          <div class="menu-lines"><span></span></div>
        </button>

        <div id="dropdownMenu" class="dropdown-menu">
          <!-- Wichtig: data-kind ist NICHT der Supabase-Typ.
               Die Zuordnung passiert im JavaScript:
               bikes -> type === "bike"
               notes -> type === "note" -->
          <div class="dropdown-item" data-kind="notes">natebikestationen</div>
          <div class="dropdown-item" data-kind="bikes">natebikes</div>
        </div>
      </div>

      <button id="adminBtn" class="adminBtn" type="button">Admin</button>
    </div>
  </header>

  <div class="wrap">
    <!-- Passwortansicht -->
    <div id="lockFrame">
      <div class="lockPanel">
        <div class="lockRow">
          <div>Passwort:</div>
          <input id="pwInput" type="password" autocomplete="current-password" />
        </div>

        <div class="lockFooter">
          <button class="btn" id="pwBtn" type="button">bestätigen</button>
        </div>

        <div id="pwMsg">falsches Passwort</div>
      </div>
    </div>

    <!-- Kartenansicht -->
    <div id="mapFrame" style="display:none;">
      <div id="map"></div>
      <div id="statusBar" class="statusBar"></div>
    </div>
  </div>

  <!-- Rechtsklick-Menü auf Karte -->
  <div id="ctxMenuMap" class="ctx-menu">
    <div class="ctx-item" data-action="bike">neues Rad hinzufügen</div>
    <div class="ctx-item" data-action="note">natebikestation hinzufügen</div>
  </div>

  <!-- Rechtsklick-Menü auf Marker -->
  <div id="ctxMenuMarker" class="ctx-menu">
    <div class="ctx-item" data-action="open">öffnen</div>
    <div class="ctx-item" data-action="move">verschieben</div>
  </div>

  <!-- Detailmodal -->
  <div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modalTitle">details</h2>
      <div class="grid" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Adminmodal -->
  <div id="adminOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>admin</h2>

      <div class="grid">
        <div class="label">Passwort</div>
        <input id="adminPwInput" type="password" autocomplete="current-password" />
      </div>

      <div id="adminMsg">falsches Passwort</div>

      <div class="modal-footer">
        <button class="btn secondary" id="adminCancelBtn" type="button">schließen</button>
        <button class="btn" id="adminOkBtn" type="button">bestätigen</button>
      </div>
    </div>
  </div>

  <!-- Listenmodal für natebikes / natebikestationen -->
  <div id="listOverlay" class="list-overlay">
    <div class="list-container">
      <div class="list-header">
        <div id="listTitle">liste</div>
        <button class="close-btn" id="listCloseBtn" type="button">×</button>
      </div>

      <div id="listItems" class="list-items"></div>
    </div>
  </div>

  <script>
    /***********************
     * Konfiguration
     ***********************/
    const SUPABASE_URL = "https://lczpdudidvzbcalzprzl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjenBkdWRpZHZ6YmNhbHpwcnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA2MDcsImV4cCI6MjA4NzU5NjYwN30.j_3fTPlwpeQNDut5iTx5b2r5sENaTlFMk-L0fBnQYL4";

    const APP_PASSWORD = "drahtesel";
    const ADMIN_PASSWORD = "eseldraht";

    const KASSEL_CENTER = [51.3127, 9.4797];
    const DEFAULT_ZOOM = 13;

    /***********************
     * Supabase
     ***********************/
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /***********************
     * Karte
     ***********************/
    const map = L.map("map", {
      center: KASSEL_CENTER,
      zoom: DEFAULT_ZOOM
    });

    // Eigene Panes: Stationen hinter Fahrrädern
    map.createPane("stationPane");
    map.getPane("stationPane").style.zIndex = 380;

    map.createPane("bikePane");
    map.getPane("bikePane").style.zIndex = 420;

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    // Standortbutton
    const LocateControl = L.Control.extend({
      options:{ position:"bottomright" },
      onAdd:function(){
        const btn = L.DomUtil.create("div", "locateBtn");
        btn.title = "Standort zentrieren";
        btn.innerHTML = '<div class="crosshair"></div>';

        L.DomEvent.disableClickPropagation(btn);

        L.DomEvent.on(btn, "click", () => {
          map.locate({
            setView:true,
            maxZoom:16,
            enableHighAccuracy:true
          });
        });

        return btn;
      }
    });

    map.addControl(new LocateControl());

    let locationMarker = null;

    map.on("locationfound", (e) => {
      if(!locationMarker){
        locationMarker = L.circleMarker(e.latlng, {
          radius:10,
          color:"#ff0000",
          weight:3,
          fillOpacity:0
        }).addTo(map);
      }else{
        locationMarker.setLatLng(e.latlng);
      }
    });

    map.on("locationerror", () => {
      showStatus("standort nicht verfügbar");
    });

    /***********************
     * Globale Marker-Daten
     ***********************/
    const markers = new Map(); // dbId -> entry
    let markersLoaded = false;
    let isAdmin = false;
    let moveModeEntry = null;

    /***********************
     * Hilfsfunktionen
     ***********************/
    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showStatus(message){
      const statusBar = document.getElementById("statusBar");
      statusBar.textContent = message;
      statusBar.style.display = "block";

      clearTimeout(showStatus.timer);
      showStatus.timer = setTimeout(() => {
        statusBar.style.display = "none";
      }, 2500);
    }

    function bikeSortValue(value){
      const text = String(value ?? "").trim();
      const number = Number(text);

      return {
        isNumber: text !== "" && Number.isFinite(number),
        number,
        text
      };
    }

    function sortBikeEntries(a, b){
      const av = bikeSortValue(a.bikeNumber);
      const bv = bikeSortValue(b.bikeNumber);

      if(av.isNumber && bv.isNumber) return av.number - bv.number;
      if(av.isNumber && !bv.isNumber) return -1;
      if(!av.isNumber && bv.isNumber) return 1;

      return av.text.localeCompare(bv.text, "de", {
        numeric:true,
        sensitivity:"base"
      });
    }

    /***********************
     * Icons
     ***********************/
    function bikeIcon(entry){
      const classes = [
        "bikeDot",
        entry.isRented ? "rented" : "",
        entry.isMoving ? "moving" : "",
        entry.isPulsing ? "selectedPulse" : ""
      ].filter(Boolean).join(" ");

      return L.divIcon({
        className:"",
        html: `
          <div class="bikeWrap">
            <div class="${classes}">
              <div class="bikeNum">${escapeHtml(entry.bikeNumber)}</div>
            </div>
          </div>
        `,
        iconSize:[24, 24],
        iconAnchor:[12, 12]
      });
    }

    function stationIcon(entry){
      const classes = [
        "stationIconImg",
        entry.isMoving ? "moving" : "",
        entry.isPulsing ? "selectedPulse" : ""
      ].filter(Boolean).join(" ");

      return L.divIcon({
        className:"",
        html: `
          <div class="stationIconWrap">
            <img class="${classes}" src="logo.png" alt="" />
          </div>
        `,
        iconSize:[33, 33],
        iconAnchor:[16.5, 16.5]
      });
    }

    function iconForEntry(entry){
      return entry.type === "bike" ? bikeIcon(entry) : stationIcon(entry);
    }

    /***********************
     * Supabase-Funktionen
     ***********************/
    async function dbLoadAll(){
      const { data, error } = await sb
        .from("markers")
        .select("*")
        .order("created_at", { ascending:true });

      if(error) throw error;
      return data || [];
    }

    async function dbInsert(type, lat, lng){
      const payload = {
        type,
        lat,
        lng,

        // Standardwerte für Fahrräder
        bike_number:"",
        name:"natebike",
        color:"undefiniert",
        remark:"keine",
        code:"",

        // Standardwerte für Stationen
        content:" ",

        is_rented:false,
        photo_url:null
      };

      const { data, error } = await sb
        .from("markers")
        .insert(payload)
        .select()
        .single();

      if(error) throw error;
      return data;
    }

    async function dbUpdate(id, patch){
      const { error } = await sb
        .from("markers")
        .update(patch)
        .eq("id", id);

      if(error) throw error;
    }

    async function dbDelete(id){
      const { error } = await sb
        .from("markers")
        .delete()
        .eq("id", id);

      if(error) throw error;
    }

    /***********************
     * Marker erzeugen / aktualisieren
     ***********************/
    function rowToEntry(row){
      return {
        id:row.id,
        type:row.type, // WICHTIG: "bike" oder "note"

        lat:row.lat,
        lng:row.lng,

        // Fahrradfelder
        bikeNumber:row.bike_number ?? "",
        bikeName:row.name ?? "",
        bikeColor:row.color ?? "",
        bikeRemark:row.remark ?? "",
        bikeCode:row.code ?? "",

        // Stationsfeld
        content:row.content ?? "",

        isRented:!!row.is_rented,
        isMoving:false,
        isPulsing:false,

        marker:null
      };
    }

    function addOrUpdateMarker(row){
      let entry = markers.get(row.id);

      if(!entry){
        entry = rowToEntry(row);

        const pane = entry.type === "bike" ? "bikePane" : "stationPane";

        entry.marker = L.marker([entry.lat, entry.lng], {
          icon:iconForEntry(entry),
          draggable:false,
          pane
        }).addTo(map);

        markers.set(entry.id, entry);
        wireMarker(entry);
      }else{
        // Vorhandenen Marker aktualisieren
        entry.type = row.type;
        entry.lat = row.lat;
        entry.lng = row.lng;

        entry.bikeNumber = row.bike_number ?? "";
        entry.bikeName = row.name ?? "";
        entry.bikeColor = row.color ?? "";
        entry.bikeRemark = row.remark ?? "";
        entry.bikeCode = row.code ?? "";

        entry.content = row.content ?? "";
        entry.isRented = !!row.is_rented;

        if(!entry.isMoving){
          entry.marker.setLatLng([entry.lat, entry.lng]);
        }

        entry.marker.setIcon(iconForEntry(entry));
      }

      return entry;
    }

    async function loadMarkersOnce(){
      const rows = await dbLoadAll();

      rows.forEach(row => {
        // Nur bekannte Markerarten verwenden
        if(row.type === "bike" || row.type === "note"){
          addOrUpdateMarker(row);
        }
      });

      markersLoaded = true;
    }

    function findEntryById(id){
      return markers.get(id) || null;
    }

    /***********************
     * Marker-Verhalten
     ***********************/
    function wireMarker(entry){
      const marker = entry.marker;

      marker.on("click", (e) => {
        L.DomEvent.stop(e);

        if(entry.type === "bike"){
          openBikeWindow(entry);
        }else{
          openStationWindow(entry);
        }
      });

      marker.on("contextmenu", (e) => {
        L.DomEvent.stop(e);

        if(!isAdmin){
          showStatus("nur admin");
          return;
        }

        openMarkerMenu(e.originalEvent, entry);
      });

      marker.on("dragstart", () => {
        map.dragging.disable();
      });

      marker.on("dragend", async () => {
        map.dragging.enable();

        if(moveModeEntry !== entry) return;

        const ll = marker.getLatLng();

        entry.lat = ll.lat;
        entry.lng = ll.lng;

        await dbUpdate(entry.id, {
          lat:ll.lat,
          lng:ll.lng
        });

        entry.isMoving = false;
        moveModeEntry = null;

        if(marker.dragging) marker.dragging.disable();
        marker.setIcon(iconForEntry(entry));

        showStatus("position gespeichert");
      });
    }

    function pulseEntry(entry){
      entry.isPulsing = true;
      entry.marker.setIcon(iconForEntry(entry));

      setTimeout(() => {
        entry.isPulsing = false;
        entry.marker.setIcon(iconForEntry(entry));
      }, 1400);
    }

    /***********************
     * Dropdown-Menü und Listen
     ***********************/
    const menuBtn = document.getElementById("menuBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdownMenu.style.display =
        dropdownMenu.style.display === "block" ? "none" : "block";
    });

    document.addEventListener("click", (e) => {
      if(!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)){
        dropdownMenu.style.display = "none";
      }
    });

    document.querySelectorAll(".dropdown-item").forEach(item => {
      item.addEventListener("click", async () => {
        const kind = item.dataset.kind;

        dropdownMenu.style.display = "none";

        if(kind === "bikes"){
          showBikeList();
        }

        if(kind === "notes"){
          showNoteList();
        }
      });
    });

    function openList(title){
      document.getElementById("listTitle").textContent = title;
      document.getElementById("listItems").innerHTML = "";
      document.getElementById("listOverlay").style.display = "flex";
    }

    function addEmptyListMessage(text){
      const listItems = document.getElementById("listItems");
      const div = document.createElement("div");
      div.className = "empty-list";
      div.textContent = text;
      listItems.appendChild(div);
    }

    function addListRow(text, entry){
      const listItems = document.getElementById("listItems");

      const row = document.createElement("div");
      row.className = "list-item";
      row.textContent = text;

      row.addEventListener("click", () => {
        document.getElementById("listOverlay").style.display = "none";

        map.setView([entry.lat, entry.lng], 17);
        pulseEntry(entry);
      });

      listItems.appendChild(row);
    }

    function showBikeList(){
      // WICHTIG:
      // Hier werden die bereits vorhandenen Marker aus der Karte genommen.
      // Gesucht wird nach Supabase type === "bike".
      const bikes = Array.from(markers.values())
        .filter(entry => entry.type === "bike")
        .sort(sortBikeEntries);

      openList("natebikes");

      if(bikes.length === 0){
        addEmptyListMessage("keine Fahrräder gefunden");
        return;
      }

      bikes.forEach(entry => {
        // Gewünscht: bikeNumber und bikeName in einer Zeile, mit Leerzeichen getrennt
        const line = `${entry.bikeNumber || ""} ${entry.bikeName || ""}`.trim();
        addListRow(line || "(ohne Nummer/Name)", entry);
      });
    }

    function showNoteList(){
      // WICHTIG:
      // Hier werden die bereits vorhandenen Marker aus der Karte genommen.
      // Gesucht wird nach Supabase type === "note".
      const notes = Array.from(markers.values())
        .filter(entry => entry.type === "note")
        .sort((a, b) => Number(a.lng) - Number(b.lng)); // westlich nach östlich

      openList("natebikestationen");

      if(notes.length === 0){
        addEmptyListMessage("keine Stationen gefunden");
        return;
      }

      notes.forEach(entry => {
        // Gewünscht: Inhalt des Markers anzeigen
        const line = String(entry.content || "").trim();
        addListRow(line || "(ohne Inhalt)", entry);
      });
    }

    document.getElementById("listCloseBtn").addEventListener("click", () => {
      document.getElementById("listOverlay").style.display = "none";
    });

    document.getElementById("listOverlay").addEventListener("click", (e) => {
      if(e.target.id === "listOverlay"){
        document.getElementById("listOverlay").style.display = "none";
      }
    });

    /***********************
     * Passwort / App öffnen
     ***********************/
    const lockFrame = document.getElementById("lockFrame");
    const mapFrame = document.getElementById("mapFrame");
    const pwInput = document.getElementById("pwInput");
    const pwBtn = document.getElementById("pwBtn");
    const pwMsg = document.getElementById("pwMsg");

    async function unlock(){
      const value = (pwInput.value || "").trim();

      if(value !== APP_PASSWORD){
        pwMsg.style.display = "block";
        return;
      }

      pwMsg.style.display = "none";
      lockFrame.style.display = "none";
      mapFrame.style.display = "block";

      setTimeout(() => {
        map.invalidateSize();
        map.locate({ setView:true, maxZoom:16, enableHighAccuracy:true });
      }, 100);

      try{
        await loadMarkersOnce();
      }catch(err){
        console.error(err);
        showStatus("marker konnten nicht geladen werden");
      }
    }

    pwBtn.addEventListener("click", unlock);
    pwInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") unlock();
    });

    /***********************
     * Admin
     ***********************/
    const adminBtn = document.getElementById("adminBtn");
    const adminOverlay = document.getElementById("adminOverlay");
    const adminPwInput = document.getElementById("adminPwInput");
    const adminOkBtn = document.getElementById("adminOkBtn");
    const adminCancelBtn = document.getElementById("adminCancelBtn");
    const adminMsg = document.getElementById("adminMsg");

    function updateAdminUI(){
      adminBtn.classList.toggle("isAdmin", isAdmin);
    }

    function openAdminModal(){
      adminPwInput.value = "";
      adminMsg.style.display = "none";
      adminOverlay.style.display = "flex";
      adminPwInput.focus();
    }

    function closeAdminModal(){
      adminOverlay.style.display = "none";
    }

    function confirmAdmin(){
      const value = (adminPwInput.value || "").trim();

      if(value !== ADMIN_PASSWORD){
        adminMsg.style.display = "block";
        return;
      }

      isAdmin = true;
      updateAdminUI();
      closeAdminModal();
      showStatus("admin aktiv");
    }

    adminBtn.addEventListener("click", () => {
      if(isAdmin){
        isAdmin = false;
        updateAdminUI();
        showStatus("admin abgemeldet");
      }else{
        openAdminModal();
      }
    });

    adminOkBtn.addEventListener("click", confirmAdmin);
    adminPwInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") confirmAdmin();
    });

    adminCancelBtn.addEventListener("click", closeAdminModal);

    adminOverlay.addEventListener("click", (e) => {
      if(e.target === adminOverlay) closeAdminModal();
    });

    /***********************
     * Karte: Admin-Kontextmenü
     ***********************/
    const ctxMenuMap = document.getElementById("ctxMenuMap");
    const ctxMenuMarker = document.getElementById("ctxMenuMarker");

    let ctxMapLatLng = null;
    let ctxMarkerEntry = null;

    function hideContextMenus(){
      ctxMenuMap.style.display = "none";
      ctxMenuMarker.style.display = "none";
      ctxMapLatLng = null;
      ctxMarkerEntry = null;
    }

    map.getContainer().addEventListener("contextmenu", e => e.preventDefault());

    map.on("contextmenu", (e) => {
      if(!isAdmin) return;

      ctxMapLatLng = e.latlng;

      hideContextMenus();

      ctxMenuMap.style.left = `${e.originalEvent.clientX}px`;
      ctxMenuMap.style.top = `${e.originalEvent.clientY}px`;
      ctxMenuMap.style.display = "block";
    });

    map.on("click", hideContextMenus);
    map.on("movestart", hideContextMenus);

    document.addEventListener("pointerdown", (e) => {
      if(!ctxMenuMap.contains(e.target) && !ctxMenuMarker.contains(e.target)){
        hideContextMenus();
      }
    });

    ctxMenuMap.addEventListener("pointerdown", async (e) => {
      const item = e.target.closest(".ctx-item");
      if(!item || !ctxMapLatLng) return;

      const action = item.dataset.action;
      const latlng = ctxMapLatLng;

      hideContextMenus();

      try{
        if(action === "bike"){
          const row = await dbInsert("bike", latlng.lat, latlng.lng);
          addOrUpdateMarker(row);
        }

        if(action === "note"){
          const row = await dbInsert("note", latlng.lat, latlng.lng);
          addOrUpdateMarker(row);
        }
      }catch(err){
        console.error(err);
        showStatus("konnte nicht gespeichert werden");
      }
    });

    function openMarkerMenu(mouseEvent, entry){
      hideContextMenus();

      ctxMarkerEntry = entry;

      ctxMenuMarker.style.left = `${mouseEvent.clientX}px`;
      ctxMenuMarker.style.top = `${mouseEvent.clientY}px`;
      ctxMenuMarker.style.display = "block";
    }

    ctxMenuMarker.addEventListener("pointerdown", (e) => {
      const item = e.target.closest(".ctx-item");
      if(!item || !ctxMarkerEntry) return;

      const action = item.dataset.action;
      const entry = ctxMarkerEntry;

      hideContextMenus();

      if(action === "open"){
        if(entry.type === "bike") openBikeWindow(entry);
        else openStationWindow(entry);
      }

      if(action === "move"){
        if(entry.isRented){
          showStatus("nicht verschiebbar");
          return;
        }

        moveModeEntry = entry;
        entry.isMoving = true;
        entry.marker.setIcon(iconForEntry(entry));

        if(entry.marker.dragging) entry.marker.dragging.enable();

        showStatus("ziehen und loslassen");
      }
    });

    /***********************
     * Detailfenster Fahrrad / Station
     ***********************/
    const modalOverlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalFooter = document.getElementById("modalFooter");

    function openModal(){
      modalOverlay.style.display = "flex";
    }

    function closeModal(){
      modalOverlay.style.display = "none";
      modalTitle.textContent = "details";
      modalBody.innerHTML = "";
      modalFooter.innerHTML = "";
    }

    modalOverlay.addEventListener("click", (e) => {
      if(e.target === modalOverlay) closeModal();
    });

    function openBikeWindow(entry){
      modalTitle.textContent = "geparktes fahrrad";

      const readonly = isAdmin ? "" : "readonly";

      modalBody.innerHTML = `
        <div class="label">Nummer</div>
        <input type="text" id="bikeNumberInput" ${readonly} value="${escapeHtml(entry.bikeNumber)}" />

        <div class="label">Name</div>
        <input type="text" id="bikeNameInput" ${readonly} value="${escapeHtml(entry.bikeName)}" />

        <div class="label">Farbe</div>
        <input type="text" id="bikeColorInput" ${readonly} value="${escapeHtml(entry.bikeColor)}" />

        <div class="label">Bemerkung</div>
        <input type="text" id="bikeRemarkInput" ${readonly} value="${escapeHtml(entry.bikeRemark)}" />

        <div class="label">Schlosscode</div>
        <input type="text" id="bikeCodeInput" ${readonly} value="${escapeHtml(entry.bikeCode)}" />
      `;

      if(isAdmin){
        modalFooter.innerHTML = `
          <button class="btn" id="bikeSaveBtn" type="button">speichern</button>
          <button class="btn danger" id="bikeDeleteBtn" type="button">löschen</button>
        `;

        document.getElementById("bikeSaveBtn").addEventListener("click", async () => {
          const patch = {
            bike_number:document.getElementById("bikeNumberInput").value.trim(),
            name:document.getElementById("bikeNameInput").value.trim(),
            color:document.getElementById("bikeColorInput").value.trim(),
            remark:document.getElementById("bikeRemarkInput").value.trim(),
            code:document.getElementById("bikeCodeInput").value.trim()
          };

          try{
            await dbUpdate(entry.id, patch);
            Object.assign(entry, {
              bikeNumber:patch.bike_number,
              bikeName:patch.name,
              bikeColor:patch.color,
              bikeRemark:patch.remark,
              bikeCode:patch.code
            });
            entry.marker.setIcon(iconForEntry(entry));
            closeModal();
          }catch(err){
            console.error(err);
            showStatus("speichern fehlgeschlagen");
          }
        }, { once:true });

        document.getElementById("bikeDeleteBtn").addEventListener("click", async () => {
          try{
            await dbDelete(entry.id);
            map.removeLayer(entry.marker);
            markers.delete(entry.id);
            closeModal();
          }catch(err){
            console.error(err);
            showStatus("löschen fehlgeschlagen");
          }
        }, { once:true });
      }

      openModal();
    }

    function openStationWindow(entry){
      modalTitle.textContent = "natebikestation";

      const readonly = isAdmin ? "" : "readonly";

      modalBody.innerHTML = `
        <div class="label">Inhalt</div>
        <textarea id="stationContentInput" ${readonly}>${escapeHtml(entry.content)}</textarea>
      `;

      if(isAdmin){
        modalFooter.innerHTML = `
          <button class="btn" id="stationSaveBtn" type="button">speichern</button>
          <button class="btn danger" id="stationDeleteBtn" type="button">löschen</button>
        `;

        document.getElementById("stationSaveBtn").addEventListener("click", async () => {
          const content = document.getElementById("stationContentInput").value.trim();

          try{
            await dbUpdate(entry.id, { content });
            entry.content = content;
            closeModal();
          }catch(err){
            console.error(err);
            showStatus("speichern fehlgeschlagen");
          }
        }, { once:true });

        document.getElementById("stationDeleteBtn").addEventListener("click", async () => {
          try{
            await dbDelete(entry.id);
            map.removeLayer(entry.marker);
            markers.delete(entry.id);
            closeModal();
          }catch(err){
            console.error(err);
            showStatus("löschen fehlgeschlagen");
          }
        }, { once:true });
      }

      openModal();
    }

    /***********************
     * Supabase Realtime
     ***********************/
    sb.channel("markers-realtime")
      .on("postgres_changes", {
        event:"*",
        schema:"public",
        table:"markers"
      }, payload => {
        if(payload.eventType === "INSERT" || payload.eventType === "UPDATE"){
          const row = payload.new;

          if(row.type === "bike" || row.type === "note"){
            addOrUpdateMarker(row);
          }
        }

        if(payload.eventType === "DELETE"){
          const oldRow = payload.old;
          const entry = findEntryById(oldRow.id);

          if(entry){
            map.removeLayer(entry.marker);
            markers.delete(entry.id);
          }
        }
      })
      .subscribe();

    updateAdminUI();
  </script>
</body>
</html>
